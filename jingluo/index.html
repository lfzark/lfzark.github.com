<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 穴位经络标注原型</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="mobile-backdrop" class="mobile-backdrop"></div>
    <div id="app">
      <aside class="sidebar left">
        <h1>经络与穴位</h1>
        <details class="section advanced-panel">
          <summary>更多设置（经络图层）</summary>
          <div id="meridian-filters"></div>
        </details>
        <div class="section">
          <h2>穴位检索</h2>
          <button id="show-all-btn" type="button" class="ghost">显示全部穴位和经络（可能较卡）</button>
          <input id="search-input" type="text" placeholder="输入穴位名..." />
          <ul id="acupoint-list"></ul>
          <div class="section">
            <h2>穴位清单</h2>
            <input id="acupoint-list-name" type="text" placeholder="清单名称，如：肩颈疏通" />
            <div class="pain-actions">
              <button id="save-acupoint-list-btn" type="button">保存/覆盖</button>
              <button id="rename-acupoint-list-btn" type="button" class="ghost">重命名</button>
            </div>
            <div class="pain-actions">
              <select id="acupoint-list-select"></select>
              <button id="delete-acupoint-list-btn" type="button" class="danger">删除</button>
            </div>
            <div class="pain-actions">
              <button id="share-acupoint-list-btn" type="button">分享清单</button>
              <button id="clear-acupoint-list-btn" type="button" class="danger">清空清单</button>
            </div>
            <ul id="acupoint-picked-list"></ul>
          </div>
        </div>
      </aside>

      <main class="viewer-wrap">
        <canvas id="scene"></canvas>
        <div class="viewer-tools">
          <button id="toggle-acupoints-btn" type="button" title="隐藏/显示穴位">◎</button>
          <button id="toggle-pains-btn" type="button" title="隐藏/显示痛点">✹</button>
          <button id="reset-view-btn" type="button" title="还原视角">⟲</button>
        </div>
        <div id="loading-overlay" class="loading-overlay">
          <div class="loading-card">
            <div class="loading-title">正在加载人体模型</div>
            <div id="loading-stage" class="loading-stage">准备中...</div>
            <div class="loading-track">
              <div id="loading-bar" class="loading-bar"></div>
            </div>
            <div id="loading-percent" class="loading-percent">0%</div>
          </div>
        </div>
        <div class="hint">左键旋转，滚轮缩放，点击人体添加疼痛点</div>
        <div id="perf-panel" class="perf-panel">加载中...</div>
        <div class="mobile-fab-bar">
          <button id="toggle-left-btn" type="button" class="ghost">穴位面板</button>
          <button id="toggle-right-btn" type="button" class="ghost">痛点面板</button>
        </div>
      </main>

      <aside class="sidebar right">
        <h2>疼痛点记录</h2>
        <div class="pain-actions">
          <button id="export-pain-btn" type="button">导出记录</button>
          <button id="clear-pain-btn" type="button" class="danger">清空记录</button>
        </div>
        <button id="toggle-perf-btn" type="button" class="ghost">显示/隐藏性能面板</button>
        <div id="selected-point-panel" class="section muted">
          点击模型表面创建疼痛点
        </div>
        <div class="section">
          <h2>疏通记录管理</h2>
          <div class="pain-actions">
            <button id="daily-report-btn" type="button">生成今日日报</button>
            <button id="clear-unblock-btn" type="button" class="danger">清空疏通记录</button>
          </div>
          <div id="daily-report-output" class="muted"></div>
          <ul id="unblock-list"></ul>
        </div>
        <ul id="pain-list"></ul>
      </aside>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
