function runBuildingProductionTick() {
    const result = {
        herb: 0,
        wood: 0,
        spiritStone: 0,
        consumedHerb: 0,
        consumedStone: 0
    };

    homeBuildingMap.forEach((building) => {
        const lvl = building.level || 1;
        if (building.type === "herbGarden") {
            result.herb += lvl;
        } else if (building.type === "woodWorkshop") {
            result.wood += lvl;
        } else if (building.type === "spiritWell") {
            const needHerb = lvl;
            if (homeInventory.herb >= needHerb) {
                homeInventory.herb -= needHerb;
                result.consumedHerb += needHerb;
                result.spiritStone += lvl * 2;
            }
        } else if (building.type === "trainingRoom") {
            const needStone = lvl;
            if (homeInventory.spiritStone >= needStone) {
                homeInventory.spiritStone -= needStone;
                result.consumedStone += needStone;
                result.herb += lvl;
            }
        }
    });

    if (result.herb > 0) homeInventory.herb += result.herb;
    if (result.wood > 0) homeInventory.wood += result.wood;
    if (result.spiritStone > 0) homeInventory.spiritStone += result.spiritStone;

    if (result.herb || result.wood || result.spiritStone || result.consumedHerb || result.consumedStone) {
        const pieces = [];
        if (result.herb) pieces.push(`灵草 +${result.herb}`);
        if (result.wood) pieces.push(`灵木 +${result.wood}`);
        if (result.spiritStone) pieces.push(`灵石 +${result.spiritStone}`);
        if (result.consumedHerb) pieces.push(`灵草 -${result.consumedHerb}`);
        if (result.consumedStone) pieces.push(`灵石 -${result.consumedStone}`);
        addLog(`洞府产出结算：${pieces.join(" / ")}`);
    }
}

function getBuildingBonuses() {
    let meditateSpeed = 1;
    let meditateExp = 1;
    let maintenanceDiscount = 0;
    let storageBonus = 0;

    homeBuildingMap.forEach((building) => {
        const lvl = building.level || 1;
        if (building.type === "herbGarden") meditateSpeed += 0.04 * lvl;
        if (building.type === "trainingRoom") meditateExp += 0.08 * lvl;
        if (building.type === "woodWorkshop") maintenanceDiscount += 0.06 * lvl;
        if (building.type === "spiritWell") storageBonus += 12 * lvl;
    });
    return {
        meditateSpeed,
        meditateExp,
        maintenanceDiscount: Math.min(0.6, maintenanceDiscount),
        storageBonus
    };
}

function applyCost(cost) {
    if (!cost) return true;
    if (
        homeInventory.spiritStone < (cost.spiritStone || 0) ||
        homeInventory.wood < (cost.wood || 0) ||
        homeInventory.herb < (cost.herb || 0) ||
        homeInventory.rareCrystal < (cost.rareCrystal || 0)
    ) {
        return false;
    }
    homeInventory.spiritStone -= cost.spiritStone || 0;
    homeInventory.wood -= cost.wood || 0;
    homeInventory.herb -= cost.herb || 0;
    homeInventory.rareCrystal -= cost.rareCrystal || 0;
    return true;
}

function canAffordFromHome(cost) {
    if (!cost) return true;
    return Object.entries(cost).every(([key, amount]) => (homeInventory[key] || 0) >= amount);
}

function applyHomeCost(cost) {
    if (!canAffordFromHome(cost)) return false;
    Object.entries(cost || {}).forEach(([key, amount]) => {
        homeInventory[key] = (homeInventory[key] || 0) - amount;
    });
    return true;
}

function applyHomeGain(gain) {
    Object.entries(gain || {}).forEach(([key, amount]) => {
        homeInventory[key] = (homeInventory[key] || 0) + amount;
        if (amount > 0 && ITEM_DEFS[key]) discoveredItemSet.add(key);
    });
}

function getWorkbenchTier() {
    const spiritWell = countBuildingsByType("spiritWell");
    const trainingRoom = countBuildingsByType("trainingRoom");
    if (town.refinementLevel >= BALANCE_CONFIG.crafting.tierUnlock[3].refinementLevel &&
        spiritWell >= BALANCE_CONFIG.crafting.tierUnlock[3].spiritWell &&
        trainingRoom >= BALANCE_CONFIG.crafting.tierUnlock[3].trainingRoom) {
        return 3;
    }
    if (town.refinementLevel >= BALANCE_CONFIG.crafting.tierUnlock[2].refinementLevel &&
        spiritWell >= BALANCE_CONFIG.crafting.tierUnlock[2].spiritWell &&
        trainingRoom >= BALANCE_CONFIG.crafting.tierUnlock[2].trainingRoom) {
        return 2;
    }
    return 1;
}

function canCraftRecipe(recipe) {
    const tier = recipe.tier || 1;
    if (getWorkbenchTier() < tier) return false;
    return canAffordFromHome(recipe.cost);
}

function craftItem(recipeId) {
    const recipe = CRAFT_RECIPES.find((r) => r.id === recipeId);
    if (!recipe) return false;
    if (getWorkbenchTier() < (recipe.tier || 1)) {
        addLog(`合成失败：工坊等级不足，需要 ${recipe.tier} 阶`);
        return false;
    }
    if (!applyHomeCost(recipe.cost)) {
        addLog(`合成失败：${recipe.label} 材料不足`);
        return false;
    }
    applyHomeGain(recipe.out);
    addLog(`合成成功：${recipe.label}`);
    return true;
}

function getMeditationExpNeed(level) {
    return 26 + level * 12;
}

function getBodyCultivationExpNeed(level) {
    return 36 + level * 24;
}

function getCultivationRateMultiplier() {
    return simulationTimeMs < cultivationBuffUntilMs ? 1.8 : 1;
}

function applyBodyCultivationTick() {
    const mult = getCultivationRateMultiplier();
    const essenceGain = Math.max(1, Math.floor((2 + Math.floor(sharedStats.spirit / 4)) * mult));
    const expGain = Math.max(1, Math.floor((3 + Math.floor(sharedStats.mind / 4)) * mult));
    heavenlyEssence += essenceGain;
    bodyCultivationExp += expGain;
    addLog(`打坐修炼结算：天地精华 +${essenceGain}，修为 +${expGain}`);
    if (autoBreakthrough) {
        while (tryBreakthrough(true)) {}
    }
}

function getBreakthroughEssenceNeed() {
    return 6 + cultivationLevel * 2;
}

function tryBreakthrough(autoTriggered = false) {
    const needExp = getBodyCultivationExpNeed(cultivationLevel);
    const needEssence = getBreakthroughEssenceNeed();
    if (bodyCultivationExp < needExp || heavenlyEssence < needEssence) {
        if (!autoTriggered) {
            addLog(`突破条件不足：需修为 ${needExp} 与天地精华 ${needEssence}`);
        }
        return false;
    }
    bodyCultivationExp -= needExp;
    heavenlyEssence -= needEssence;
    cultivationLevel = Math.min(cultivationLevel + 1, REALM_NAMES.length - 1);
    sharedStats.level += 1;
    sharedStats.spirit += 1;
    sharedStats.mind += 1;
    sharedStats.body += 1;
    sharedStats.freePoints += 3;
    addLog(`突破成功：境界提升至 ${getRealmName()}`);
    return true;
}

function startMeditation() {
    if (isMeditating || isGathering) {
        addLog("当前已有进行中的修炼行为");
        return;
    }
    const bonuses = getBuildingBonuses();
    const duration = Math.max(4000, Math.floor(MEDITATE_BASE_MS / bonuses.meditateSpeed));
    isMeditating = true;
    meditateTotalMs = duration;
    meditateRemainingMs = duration;
    addLog(`开始打坐，预计 ${Math.ceil(duration / 1000)} 秒`);
}

function finishMeditation() {
    const bonuses = getBuildingBonuses();
    const mult = getCultivationRateMultiplier();
    const gain = Math.max(1, Math.floor((4 + Math.floor(sharedStats.mind / 4)) * bonuses.meditateExp * mult));
    bodyCultivationExp += gain;
    heavenlyEssence += Math.max(1, Math.floor(1 * mult));
    isMeditating = false;
    meditateRemainingMs = 0;
    meditateTotalMs = 0;
    addLog(`打坐完成，获得修为 ${gain}`);
    if (autoBreakthrough) {
        while (tryBreakthrough(true)) {}
    }
}

function chunkKeyFromTile(x, y) {
    const cx = Math.floor(x / CHUNK_SIZE);
    const cy = Math.floor(y / CHUNK_SIZE);
    return `${cx},${cy}`;
}

function getChunkHeatAt(x, y) {
    const key = chunkKeyFromTile(x, y);
    const entry = chunkHeatMap.get(key);
    if (!entry) return 0;
    const elapsedSec = Math.max(0, (simulationTimeMs - entry.updatedAt) / 1000);
    if (elapsedSec > 0) {
        entry.heat *= Math.exp(-CHUNK_HEAT_DECAY_PER_SEC * elapsedSec);
        entry.updatedAt = simulationTimeMs;
    }
    if (entry.heat < 0.01) {
        chunkHeatMap.delete(key);
        return 0;
    }
    return entry.heat;
}

function addChunkHeatAt(x, y, amount) {
    const key = chunkKeyFromTile(x, y);
    const current = getChunkHeatAt(x, y);
    chunkHeatMap.set(key, {
        heat: Math.min(30, current + amount),
        updatedAt: simulationTimeMs
    });
}

function cleanupTargetBackoff() {
    targetBackoffMap.forEach((entry, key) => {
        if (entry.untilMs <= simulationTimeMs) {
            targetBackoffMap.delete(key);
        }
    });
}

function markTargetBackoff(x, y) {
    const key = tileKey(x, y);
    const prev = targetBackoffMap.get(key);
    const failCount = prev ? prev.failCount + 1 : 1;
    const duration = Math.min(TARGET_BACKOFF_MAX_MS, TARGET_BACKOFF_BASE_MS * Math.pow(2, failCount - 1));
    targetBackoffMap.set(key, {
        failCount,
        untilMs: simulationTimeMs + duration
    });
}

function canUseTarget(x, y) {
    cleanupTargetBackoff();
    const entry = targetBackoffMap.get(tileKey(x, y));
    return !entry || entry.untilMs <= simulationTimeMs;
}

function resourceUnitWeight(resourceKey) {
    return resourceKey === "rareCrystal" ? 4 : 1;
}

function getSharedPowerScore() {
    return sharedStats.body + sharedStats.spirit + sharedStats.mind + sharedStats.control + sharedStats.fortune;
}

function allocSharedStat(statKey) {
    if (sharedStats.freePoints <= 0) return false;
    if (!Object.prototype.hasOwnProperty.call(sharedStats, statKey)) return false;
    sharedStats[statKey] += 1;
    sharedStats.freePoints -= 1;
    return true;
}

function getEquipmentBonus() {
    const bonus = { atk: 0, def: 0, hit: 0, dodge: 0, luck: 0 };
    Object.entries(equipmentInventory).forEach(([itemId, count]) => {
        const def = ITEM_DEFS[itemId];
        if (!def || count <= 0) return;
        const cfg = def.bonus || {};
        const enhanceMul = 1 + (equipmentEnhanceLevels[itemId] || 0) * 0.12;
        bonus.atk += (cfg.atk || 0) * count * enhanceMul;
        bonus.def += (cfg.def || 0) * count * enhanceMul;
        bonus.hit += (cfg.hit || 0) * count * enhanceMul;
        bonus.dodge += (cfg.dodge || 0) * count * enhanceMul;
        bonus.luck += (cfg.luck || 0) * count * enhanceMul;
    });
    if ((homeInventory.ascendSeal || 0) > 0) {
        bonus.luck += 6;
        bonus.def += 2;
    }
    return bonus;
}

function getEnhanceCost(itemId) {
    const level = equipmentEnhanceLevels[itemId] || 0;
    const rarity = ITEM_DEFS[itemId]?.rarity || "common";
    const rarityMul = rarity === "epic" ? 1.8 : rarity === "rare" ? 1.45 : rarity === "uncommon" ? 1.2 : 1;
    return Math.floor((28 + level * 16) * rarityMul);
}

function enhanceEquipment(itemId) {
    if ((equipmentInventory[itemId] || 0) <= 0) return false;
    const level = equipmentEnhanceLevels[itemId] || 0;
    if (level >= 10) {
        addLog(`强化失败：${ITEM_DEFS[itemId]?.label || itemId} 已达 +10`);
        return false;
    }
    const cost = getEnhanceCost(itemId);
    if (goldCoins < cost) {
        addLog(`强化失败：金币不足（需要 ${cost}）`);
        return false;
    }
    goldCoins -= cost;
    equipmentEnhanceLevels[itemId] = level + 1;
    addLog(`强化成功：${ITEM_DEFS[itemId]?.label || itemId} +${equipmentEnhanceLevels[itemId]}`);
    return true;
}

function buyFromShop(itemId, cost, qty = 1) {
    if (goldCoins < cost) {
        addLog(`购买失败：金币不足（需要 ${cost}）`);
        return false;
    }
    goldCoins -= cost;
    homeInventory[itemId] = (homeInventory[itemId] || 0) + qty;
    discoveredItemSet.add(itemId);
    addLog(`商店购买：${ITEM_DEFS[itemId]?.label || itemId} x${qty}（花费 ${cost} 金币）`);
    return true;
}

function bindItemHover(containerEl) {
    if (!containerEl) return;
    containerEl.querySelectorAll(".inv-slot[data-item-id], .codex-item[data-item-id]").forEach((el) => {
        el.addEventListener("mousemove", (e) => {
            const itemId = el.dataset.itemId;
            const def = ITEM_DEFS[itemId];
            if (!def) return;
            const qty = el.dataset.itemCount || "0";
            const rarity = (def.rarity || "common").toUpperCase();
            const bonus = def.bonus
                ? `加成: ${Object.entries(def.bonus).map(([k, v]) => `${k}+${v}`).join(" / ")}`
                : "加成: 无";
            itemDetailEl.innerHTML = `<strong>${def.icon} ${def.label}</strong><br>品质: ${rarity}<br>类别: ${def.category}<br>${bonus}<br>来源: ${def.source}<br>回收: ${def.sellValue || 0} 金币<br>持有: ${qty}`;
            itemDetailEl.classList.remove("hidden");
            itemDetailEl.style.left = `${e.clientX + 12}px`;
            itemDetailEl.style.top = `${e.clientY + 12}px`;
        });
        el.addEventListener("mouseleave", () => {
            itemDetailEl.classList.add("hidden");
        });
    });
}

function getAvatarMaxHp() {
    return 120 + sharedStats.body * 7 + Math.floor(getSharedPowerScore() * 0.7);
}

function getAvatarMaxMp() {
    return 90 + sharedStats.spirit * 8 + sharedStats.mind * 4;
}

function getAvatarCombatPower() {
    const eq = getEquipmentBonus();
    const wardBonus = Math.min(6, (homeInventory.wardCharm || 0));
    const focusBonus = Math.min(6, (homeInventory.focusCharm || 0));
    return {
        atk: 10 + Math.floor(sharedStats.spirit * 1.4) + Math.floor(sharedStats.control * 0.9) + Math.floor(eq.atk),
        def: 4 + Math.floor(sharedStats.body * 0.9) + Math.floor(sharedStats.control * 0.4) + Math.floor(eq.def) + wardBonus,
        hit: Math.min(0.97, 0.78 + sharedStats.mind * 0.008 + sharedStats.control * 0.004 + eq.hit + focusBonus * 0.005),
        dodge: Math.min(0.42, 0.06 + sharedStats.body * 0.008 + sharedStats.mind * 0.004 + eq.dodge)
    };
}

function getAvatarCombatSnapshot() {
    const me = getAvatarCombatPower();
    const tactic = currentBattleTactic();
    const critRate = Math.max(0.03, Math.min(0.55, 0.08 + sharedStats.fortune * 0.006 + tactic.critBonus));
    return {
        hp: avatarHp,
        maxHp: getAvatarMaxHp(),
        mp: avatarMp,
        maxMp: getAvatarMaxMp(),
        atk: me.atk,
        def: me.def,
        hit: me.hit,
        dodge: me.dodge,
        critRate
    };
}

function currentBattleTactic() {
    return BATTLE_TACTICS.find((t) => t.id === battleTacticId) || BATTLE_TACTICS[1];
}

function getRiskRewardBonusAt(x, y) {
    const dist = Math.abs(x - HOME_X) + Math.abs(y - HOME_Y);
    return Math.min(0.9, dist * 0.03);
}

function weightedPick(table, seedA, seedB) {
    const total = table.reduce((sum, row) => sum + row.weight, 0);
    if (total <= 0) return table[0];
    const roll = simpleHash(seedA, seedB) % total;
    let acc = 0;
    for (const row of table) {
        acc += row.weight;
        if (roll < acc) return row;
    }
    return table[table.length - 1];
}

function openChest(chestId) {
    if (!Object.prototype.hasOwnProperty.call(avatarInventory, chestId)) return false;
    if ((avatarInventory[chestId] || 0) <= 0) return false;
    const table = CHEST_LOOT_TABLES[chestId];
    if (!table) return false;
    avatarInventory[chestId] -= 1;
    const rolls = chestId === "chestSmall" ? 1 : chestId === "chestMedium" ? 2 : 3;
    const rewards = {};
    for (let i = 0; i < rolls; i++) {
        const pick = weightedPick(table, dayCount * 97 + i * 17 + gatherCount, simulationTimeMs + i * 113);
        const qtyRange = Math.max(0, pick.max - pick.min);
        const qty = pick.min + (simpleHash(dayCount + i * 7, simulationTimeMs + i * 41) % (qtyRange + 1));
        avatarInventory[pick.id] = (avatarInventory[pick.id] || 0) + qty;
        rewards[pick.id] = (rewards[pick.id] || 0) + qty;
        discoveredItemSet.add(pick.id);
    }
    const rewardText = Object.entries(rewards).map(([id, qty]) => `${ITEM_DEFS[id]?.label || id}×${qty}`).join(" / ");
    addLog(`开启${ITEM_DEFS[chestId]?.label || "宝箱"}：${rewardText}`);
    updateSidePanels();
    updateStatus();
    return true;
}

function getItemContainer(source) {
    if (source === "avatar") return avatarInventory;
    if (source === "home") return homeInventory;
    if (source === "equipment") return equipmentInventory;
    return null;
}

function isEquipItem(itemId) {
    return ITEM_DEFS[itemId]?.category === "装备";
}

function canUseItem(itemId) {
    return ITEM_DEFS[itemId]?.usable || itemId === "baitFlag" || itemId.startsWith("chest");
}

function useItemFrom(source, itemId) {
    const bag = getItemContainer(source);
    if (!bag || (bag[itemId] || 0) <= 0) return false;
    if (itemId === "chestSmall" || itemId === "chestMedium" || itemId === "chestLarge") {
        if (source !== "avatar") return false;
        return openChest(itemId);
    }
    if (itemId === "spiritPill") {
        bag[itemId] -= 1;
        if (battleState || avatarHp < getAvatarMaxHp()) {
            const heal = Math.floor(getAvatarMaxHp() * 0.28);
            avatarHp = Math.min(getAvatarMaxHp(), avatarHp + heal);
            addLog(`使用聚灵丹，恢复生命 ${heal}`);
        } else {
            cultivationBuffUntilMs = Math.max(cultivationBuffUntilMs, simulationTimeMs) + 180000;
            addLog("服用聚灵丹：肉身修炼效率提升 180 秒");
        }
        return true;
    }
    if (itemId === "healingSalve") {
        bag[itemId] -= 1;
        const heal = Math.floor(getAvatarMaxHp() * 0.2);
        avatarHp = Math.min(getAvatarMaxHp(), avatarHp + heal);
        addLog(`使用回春散，恢复生命 ${heal}`);
        return true;
    }
    if (itemId === "baitFlag") {
        if (source !== "avatar") return false;
        bag[itemId] -= 1;
        baitBoostUntilMs = simulationTimeMs + 120000;
        addLog("使用引妖旗：120秒内刷怪率提升");
        return true;
    }
    if (itemId === "wardCharm") {
        bag[itemId] -= 1;
        homeInventory.wardCharm = (homeInventory.wardCharm || 0) + 1;
        addLog("使用护体符：转化为洞府护持层数");
        return true;
    }
    if (itemId === "focusCharm") {
        bag[itemId] -= 1;
        homeInventory.focusCharm = (homeInventory.focusCharm || 0) + 1;
        addLog("使用凝神符：转化为洞府凝神层数");
        return true;
    }
    return false;
}

function equipItemFrom(source, itemId) {
    if (!isEquipItem(itemId)) return false;
    const bag = getItemContainer(source);
    if (!bag || (bag[itemId] || 0) <= 0) return false;
    if (source === "equipment") return false;
    bag[itemId] -= 1;
    equipmentInventory[itemId] = (equipmentInventory[itemId] || 0) + 1;
    addLog(`装备已激活：${ITEM_DEFS[itemId]?.label || itemId}`);
    return true;
}

function recycleItemFrom(source, itemId) {
    if (source === "equipment") return false;
    const bag = getItemContainer(source);
    if (!bag || (bag[itemId] || 0) <= 0) return false;
    if (itemId === "ascendSeal" || itemId === "dragonRelic") return false;
    const value = ITEM_DEFS[itemId]?.sellValue || 0;
    if (value <= 0) return false;
    bag[itemId] -= 1;
    goldCoins += value;
    addLog(`回收 ${ITEM_DEFS[itemId]?.label || itemId}，获得金币 ${value}`);
    return true;
}

function closeItemMenu() {
    itemMenuState = null;
    itemMenuEl.classList.add("hidden");
}

function openItemMenu(itemId, source, anchorEvent) {
    const def = ITEM_DEFS[itemId];
    const bag = getItemContainer(source);
    if (!def || !bag || (bag[itemId] || 0) <= 0) return;
    itemMenuState = { itemId, source };
    const canUse = canUseItem(itemId);
    const canEquip = isEquipItem(itemId) && source !== "equipment";
    const canRecycle = source !== "equipment" && (def.sellValue || 0) > 0 && itemId !== "ascendSeal" && itemId !== "dragonRelic";
    itemMenuEl.innerHTML = `
        <div class="menu-title">${def.icon} ${def.label} · 数量 ${bag[itemId] || 0}</div>
        <div class="menu-actions">
            <button class="mini-btn" data-item-action="use" ${canUse ? "" : "disabled"}>使用</button>
            <button class="mini-btn" data-item-action="equip" ${canEquip ? "" : "disabled"}>装备</button>
            <button class="mini-btn" data-item-action="recycle" ${canRecycle ? "" : "disabled"}>回收为金币（${def.sellValue || 0}）</button>
        </div>
    `;
    itemMenuEl.style.left = `${Math.min(window.innerWidth - 210, anchorEvent.clientX + 8)}px`;
    itemMenuEl.style.top = `${Math.min(window.innerHeight - 150, anchorEvent.clientY + 8)}px`;
    itemMenuEl.classList.remove("hidden");
}

function getAvatarVisualState() {
    if (battleState) return { css: "state-battle", badge: "⚔" };
    if (isGathering) return { css: "state-gather", badge: "⛏" };
    if (autoObjective === "return_home") return { css: "state-move", badge: "🏠" };
    if (simulationTimeMs - lastMoveAtMs <= 900) return { css: "state-move", badge: "🧭" };
    return { css: "state-idle", badge: isAutoMode ? "🧭" : "•" };
}

function spawnCombatFx(text, type = "damage", yOffset = 0) {
    if (!combatFxLayerEl || !text) return;
    const fx = document.createElement("div");
    fx.className = `combat-fx ${type}`;
    fx.textContent = text;
    const baseTop = battleState ? 46 : 52;
    fx.style.setProperty("--fx-left", "50%");
    fx.style.setProperty("--fx-top", `${baseTop + yOffset}%`);
    combatFxLayerEl.appendChild(fx);
    setTimeout(() => fx.remove(), 900);
}

function monsterLevelAt(x, y) {
    const dist = Math.abs(x - HOME_X) + Math.abs(y - HOME_Y);
    if (dist <= 5) return 1;
    if (dist <= 9) return 2;
    if (dist <= 13) return 3;
    if (dist <= 18) return 4;
    return 5;
}

function getMonsterDropProfile(type) {
    return MONSTER_CODEX.find((m) => m.type === type) || null;
}

function getMonsterSeed(x, y) {
    const h = simpleHash(x * 17 + 13, y * 19 + 29);
    const terrain = getTerrainClass(x, y);
    if (!isPassable(x, y)) return null;
    if (isHomeBuildTile(x, y)) return null;
    if (devForceMonster) {
        const level = Math.max(1, monsterLevelAt(x, y));
        const type = level >= 8 ? "天劫妖王" : level >= 6 ? "精英妖将" : level >= 4 ? "妖将" : level >= 2 ? "妖兽" : "邪祟";
        const devMul = type === "天劫妖王" ? 3.1 : type === "精英妖将" ? 2.1 : 1;
        return {
            type,
            level,
            maxHp: Math.floor((34 + level * 24) * BALANCE_CONFIG.combat.monsterHpScale * devMul),
            atk: Math.floor((8 + level * 3 + (level >= 6 ? 7 : 0)) * (type === "天劫妖王" ? 2.2 : type === "精英妖将" ? 1.55 : 1)),
            def: Math.floor((2 + level * 2 + (level >= 6 ? 4 : 0)) * (type === "天劫妖王" ? 2.0 : type === "精英妖将" ? 1.5 : 1))
        };
    }
    const baitBoost = simulationTimeMs < baitBoostUntilMs ? 0.2 : 0;
    const spawnBase = (terrain === "mountain" ? 0.34 : terrain === "forest" ? 0.28 : terrain === "hill" ? 0.22 : 0.12) + baitBoost;
    const spawnRoll = (h % 1000) / 1000;
    if (spawnRoll > spawnBase) return null;
    const level = monsterLevelAt(x, y);
    const rareRoll = ((h >> 10) % 1000) / 1000;
    let type = rareRoll < 0.08 ? "妖将" : rareRoll < 0.28 ? "妖兽" : "邪祟";
    if (level >= 4 && rareRoll < 0.05) type = "精英妖将";
    if (level >= 4 && rareRoll < 0.01) type = "天劫妖王";
    const eliteMul = type === "精英妖将" ? 2.0 : type === "天劫妖王" ? 3.0 : 1;
    const maxHp = Math.floor((32 + level * 22 + (h % 9)) * BALANCE_CONFIG.combat.monsterHpScale * eliteMul);
    const atk = Math.floor((8 + level * 3 + (h % 4)) * (type === "天劫妖王" ? 2.4 : type === "精英妖将" ? 1.75 : 1));
    const def = Math.floor((2 + level * 2) * (type === "天劫妖王" ? 2.3 : type === "精英妖将" ? 1.7 : 1));
    return { type, level, maxHp, atk, def };
}

function getMonsterAt(x, y) {
    const key = tileKey(x, y);
    const seed = getMonsterSeed(x, y);
    if (!seed) return null;
    const entry = monsterStateMap.get(key);
    if (!entry) {
        const created = { alive: true, hp: seed.maxHp, respawnAt: 0 };
        monsterStateMap.set(key, created);
        return { ...seed, x, y, hp: created.hp, alive: true };
    }
    if (!entry.alive) {
        if (simulationTimeMs >= entry.respawnAt) {
            entry.alive = true;
            entry.hp = seed.maxHp;
        } else {
            return null;
        }
    }
    return { ...seed, x, y, hp: entry.hp, alive: true };
}

function setMonsterHp(x, y, hp, maxHp) {
    const key = tileKey(x, y);
    const entry = monsterStateMap.get(key) || { alive: true, hp: maxHp, respawnAt: 0 };
    entry.hp = Math.max(0, hp);
    if (entry.hp <= 0) {
        entry.alive = false;
        entry.respawnAt = simulationTimeMs + BALANCE_CONFIG.timing.monsterRespawnMs;
    } else {
        entry.alive = true;
    }
    monsterStateMap.set(key, entry);
}

function startBattleWith(monster) {
    if (!monster) return false;
    isGathering = false;
    gatherRemainingMs = 0;
    gatherTotalMs = 0;
    gatheringProgress = 0;
    gatheringTarget = null;
    battleState = {
        x: monster.x,
        y: monster.y,
        type: monster.type,
        level: monster.level,
        hp: monster.hp,
        maxHp: monster.maxHp,
        atk: monster.atk,
        def: monster.def,
        rounds: 0
    };
    battleRoundLogs = [`遭遇 ${monster.type} Lv.${monster.level}`];
    lastBattleFrame = null;
    movementStatusText = `遭遇 ${monster.type} Lv.${monster.level}，进入战斗`;
    return true;
}

function grantBattleLoot(monster) {
    const riskBonus = getRiskRewardBonusAt(monster.x, monster.y);
    const tierMul = monster.type === "天劫妖王" ? 3.2 : monster.type === "精英妖将" ? 2.2 : monster.type === "妖将" ? 1.5 : 1;
    const gainStone = Math.floor((8 + monster.level * 4) * (1 + riskBonus * 0.9) * tierMul);
    const gainHerb = monster.level >= 2 ? Math.max(1, Math.floor((riskBonus >= 0.35 ? 2 : 1) * tierMul)) : 0;
    const eq = getEquipmentBonus();
    const rareChance = Math.min(BALANCE_CONFIG.drops.rareMax, BALANCE_CONFIG.drops.rareBase + sharedStats.fortune + Math.floor(eq.luck * 0.8));
    const coreBase = monster.type === "妖将" ? 22 : monster.type === "妖兽" ? 14 : 8;
    const coreChance = Math.min(55, coreBase + Math.floor(sharedStats.fortune * 0.6));
    const gainRare = monster.level >= 3 && (devFixedDrops || (simpleHash(monster.x + dayCount, monster.y + dayCombatWins) % 100 < (rareChance + Math.floor(riskBonus * 18) + (monster.type === "天劫妖王" ? 22 : monster.type === "精英妖将" ? 12 : 0)))) ? Math.max(1, Math.floor(tierMul / 1.5)) : 0;
    const gainCore = devFixedDrops ? Math.max(1, Math.floor(tierMul)) : (simpleHash(monster.x + dayCount * 3, monster.y + dayCombatWins * 11) % 100 < coreChance ? Math.max(1, Math.floor(tierMul)) : 0);
    const chestSmallChance = Math.min(95, BALANCE_CONFIG.drops.chestSmallBase + Math.floor(riskBonus * 42) + monster.level * 7);
    const chestMediumChance = Math.min(75, BALANCE_CONFIG.drops.chestMediumBase + Math.floor(riskBonus * 36) + (monster.level >= 2 ? 14 : 0));
    const chestLargeChance = Math.min(55, BALANCE_CONFIG.drops.chestLargeBase + Math.floor(riskBonus * 20) + (monster.type === "妖将" ? 14 : monster.type === "精英妖将" ? 24 : monster.type === "天劫妖王" ? 40 : 0));
    const gainSmallChest = devFixedDrops || (simpleHash(monster.x + 41, monster.y + dayCombatWins * 7) % 100 < chestSmallChance) ? 1 : 0;
    const gainMediumChest = devFixedDrops || (simpleHash(monster.x + 71, monster.y + dayCombatWins * 13) % 100 < chestMediumChance) ? 1 : 0;
    const gainLargeChest = devFixedDrops || (simpleHash(monster.x + 97, monster.y + dayCombatWins * 19) % 100 < chestLargeChance) ? 1 : 0;
    const dropWeaponRoll = simpleHash(monster.x + dayCount * 37, monster.y + dayCombatWins * 31) % 1000;
    let gainThunderBlade = 0;
    let gainPhoenixBow = 0;
    let gainVoidArmor = 0;
    let gainDragonRelic = 0;
    if (monster.type === "精英妖将" || monster.type === "天劫妖王") {
        if (dropWeaponRoll < 90) gainThunderBlade = 1;
        else if (dropWeaponRoll < 170) gainPhoenixBow = 1;
        else if (dropWeaponRoll < 250) gainVoidArmor = 1;
    }
    if (monster.type === "天劫妖王" && (devFixedDrops || (simpleHash(monster.x + 211, monster.y + dayCombatWins * 53) % 100 < 20))) {
        gainDragonRelic = 1;
    }
    avatarInventory.spiritStone += gainStone;
    avatarInventory.herb += gainHerb;
    avatarInventory.rareCrystal += gainRare;
    avatarInventory.demonCore += gainCore;
    avatarInventory.chestSmall += gainSmallChest;
    avatarInventory.chestMedium += gainMediumChest;
    avatarInventory.chestLarge += gainLargeChest;
    avatarInventory.thunderBlade += gainThunderBlade;
    avatarInventory.phoenixBow += gainPhoenixBow;
    avatarInventory.voidArmor += gainVoidArmor;
    avatarInventory.dragonRelic += gainDragonRelic;
    discoveredItemSet.add("demonCore");
    if (gainRare > 0) discoveredItemSet.add("rareCrystal");
    if (gainSmallChest > 0) discoveredItemSet.add("chestSmall");
    if (gainMediumChest > 0) discoveredItemSet.add("chestMedium");
    if (gainLargeChest > 0) discoveredItemSet.add("chestLarge");
    if (gainThunderBlade > 0) discoveredItemSet.add("thunderBlade");
    if (gainPhoenixBow > 0) discoveredItemSet.add("phoenixBow");
    if (gainVoidArmor > 0) discoveredItemSet.add("voidArmor");
    if (gainDragonRelic > 0) discoveredItemSet.add("dragonRelic");
    dayCombatWins += 1;
    addLog(`战斗胜利：${monster.type}，掉落 灵石×${gainStone}${gainHerb ? ` / 灵草×${gainHerb}` : ""}${gainCore ? ` / 妖丹×${gainCore}` : ""}${gainRare ? ` / 异晶×${gainRare}` : ""}${gainSmallChest ? ` / 小宝箱×${gainSmallChest}` : ""}${gainMediumChest ? ` / 中宝箱×${gainMediumChest}` : ""}${gainLargeChest ? ` / 大宝箱×${gainLargeChest}` : ""}${gainThunderBlade ? " / 雷劫断岳×1" : ""}${gainPhoenixBow ? " / 赤凰长弓×1" : ""}${gainVoidArmor ? " / 太虚战铠×1" : ""}${gainDragonRelic ? " / 天龙遗宝×1" : ""}`);
}

function resolveBattleStep() {
    if (!battleState) return;
    const tactic = currentBattleTactic();
    const debuffActive = simulationTimeMs < injuryDebuffUntilMs;
    const meBase = getAvatarCombatPower();
    const debuffMul = debuffActive ? BALANCE_CONFIG.combat.injuryDebuffRatio : 1;
    const me = {
        atk: Math.max(1, Math.floor(meBase.atk * tactic.atkMul * debuffMul)),
        def: Math.max(1, Math.floor(meBase.def * tactic.defMul * debuffMul)),
        hit: Math.min(0.98, Math.max(0.55, meBase.hit + tactic.hitBonus - (debuffActive ? 0.03 : 0))),
        dodge: Math.min(0.55, Math.max(0.03, meBase.dodge + tactic.dodgeBonus - (debuffActive ? 0.02 : 0)))
    };
    battleState.rounds += 1;
    const rollA = (simpleHash(battleState.x + battleState.rounds * 7, battleState.y + dayCount * 17) % 1000) / 1000;
    const rollB = (simpleHash(battleState.x + battleState.rounds * 13, battleState.y + dayCount * 23) % 1000) / 1000;
    const avatarHit = rollA <= me.hit;
    const monsterHit = rollB > me.dodge;
    const avatarDmgBase = avatarHit ? Math.max(1, me.atk - battleState.def + (battleState.rounds % 3)) : 0;
    const monsterDmgBase = monsterHit ? Math.max(1, battleState.atk - me.def) : 0;
    const critRoll = (simpleHash(battleState.x + battleState.rounds * 29, battleState.y + dayCount * 5) % 1000) / 1000;
    const didCrit = avatarHit && critRoll < (0.1 + tactic.critBonus);
    const avatarScaled = Math.max(0, Math.floor(avatarDmgBase * BALANCE_CONFIG.combat.playerDamageScale));
    const monsterScaled = Math.max(0, Math.floor(monsterDmgBase * BALANCE_CONFIG.combat.monsterDamageScale * tactic.incomingMul));
    const finalAvatarDmg = didCrit ? Math.max(1, Math.floor(avatarScaled * 1.6)) : avatarScaled;
    const hpBefore = { enemy: battleState.hp, self: avatarHp };
    battleState.hp = Math.max(0, battleState.hp - finalAvatarDmg);
    avatarHp = Math.max(0, avatarHp - monsterScaled);
    lastBattleFrame = {
        round: battleState.rounds,
        tactic: tactic.label,
        avatarHit,
        monsterHit,
        crit: didCrit,
        avatarDmg: finalAvatarDmg,
        monsterDmg: monsterScaled,
        hitRoll: Number(rollA.toFixed(3)),
        dodgeRoll: Number(rollB.toFixed(3)),
        hpBefore,
        hpAfter: { enemy: battleState.hp, self: avatarHp }
    };
    if (didCrit) {
        spawnCombatFx(`暴击 ${finalAvatarDmg}`, "info", -6);
    } else if (avatarHit) {
        spawnCombatFx(`-${finalAvatarDmg}`, "damage", -6);
    } else {
        spawnCombatFx("闪避", "info", -6);
    }
    if (monsterHit) {
        spawnCombatFx(`受击 -${monsterScaled}`, "damage", 6);
    } else {
        spawnCombatFx("未命中", "info", 6);
    }
    battleRoundLogs.unshift(`R${battleState.rounds} ${tactic.label} | 我方${avatarHit ? "命中" : "未中"}-${finalAvatarDmg}${didCrit ? "(暴)" : ""} / 敌方${monsterHit ? "命中" : "未中"}-${monsterScaled} | 命中检定 ${rollA.toFixed(2)}/${me.hit.toFixed(2)} | 闪避检定 ${rollB.toFixed(2)}/${me.dodge.toFixed(2)}`);
    if (battleRoundLogs.length > 14) battleRoundLogs.length = 14;
    movementStatusText = `战斗中 ${battleState.type} HP ${battleState.hp}/${battleState.maxHp}，化身HP ${avatarHp}/${getAvatarMaxHp()}`;
    if (battleState.hp <= 0) {
        setMonsterHp(battleState.x, battleState.y, 0, battleState.maxHp);
        grantBattleLoot(battleState);
        battleState = null;
        if (shouldReturnHome()) autoObjective = "return_home";
        return;
    }
    if (avatarHp <= Math.floor(getAvatarMaxHp() * autoUsePillRatio) && (avatarInventory.spiritPill || 0) > 0) {
        avatarInventory.spiritPill -= 1;
        const heal = Math.floor(getAvatarMaxHp() * 0.32);
        avatarHp = Math.min(getAvatarMaxHp(), avatarHp + heal);
        spawnCombatFx(`+${heal}`, "heal", 12);
        battleRoundLogs.unshift("触发聚灵丹：回复生命");
    }
    if (avatarHp <= Math.floor(getAvatarMaxHp() * autoUseSalveRatio) && (avatarInventory.healingSalve || 0) > 0) {
        avatarInventory.healingSalve -= 1;
        const heal = Math.floor(getAvatarMaxHp() * 0.22);
        avatarHp = Math.min(getAvatarMaxHp(), avatarHp + heal);
        spawnCombatFx(`+${heal}`, "heal", 16);
        battleRoundLogs.unshift("触发回春散：稳定伤势");
    }
    if (avatarHp <= 0) {
        const riskBonus = getRiskRewardBonusAt(battleState.x, battleState.y);
        const lossRatio = 0.12 + riskBonus * 0.18;
        const lostStone = Math.floor(avatarInventory.spiritStone * lossRatio);
        const lostCore = Math.floor((avatarInventory.demonCore || 0) * (0.08 + riskBonus * 0.12));
        avatarInventory.spiritStone = Math.max(0, avatarInventory.spiritStone - lostStone);
        avatarInventory.demonCore = Math.max(0, avatarInventory.demonCore - lostCore);
        avatarX = HOME_X;
        avatarY = HOME_Y;
        avatarHp = Math.floor(getAvatarMaxHp() * 0.6);
        avatarMp = Math.floor(getAvatarMaxMp() * 0.6);
        injuryDebuffUntilMs = simulationTimeMs + BALANCE_CONFIG.combat.injuryDurationMs;
        battleState = null;
        autoObjective = "explore";
        addLog(`化身重伤退回洞府，损失灵石 ${lostStone}${lostCore ? ` / 妖丹 ${lostCore}` : ""}，2分钟内战斗属性衰减`);
        return;
    }
    if (avatarHp <= Math.floor(getAvatarMaxHp() * BALANCE_CONFIG.combat.lowHpRetreatRatio)) {
        addLog("化身血量偏低，撤离返城");
        autoObjective = "return_home";
        battleState = null;
    }
}

function getRealmName() {
    return REALM_NAMES[Math.min(cultivationLevel, REALM_NAMES.length - 1)];
}

function totalInventoryLoad() {
    return avatarInventory.spiritStone + avatarInventory.herb + avatarInventory.wood + avatarInventory.demonCore * 2 + avatarInventory.rareCrystal * 4 +
        avatarInventory.chestSmall + avatarInventory.chestMedium * 2 + avatarInventory.chestLarge * 3;
}

function distanceToHome() {
    return Math.abs(avatarX - HOME_X) + Math.abs(avatarY - HOME_Y);
}

function isAtHome() {
    return avatarX === HOME_X && avatarY === HOME_Y;
}

function resourceKeyFromSeed(seed) {
    if (seed.mainType === "herb") return "herb";
    if (seed.mainType === "wood") return "wood";
    if (seed.mainType === "rare") return "rareCrystal";
    return "spiritStone";
}

function movementCostAt(x, y) {
    const terrain = getTerrainClass(x, y);
    return TERRAIN_RULES[terrain].moveCost;
}

function isPassable(x, y) {
    return TERRAIN_RULES[getTerrainClass(x, y)].passable;
}

function chooseResourceTargets(limit = TARGET_POOL_SIZE) {
    const strategy = currentStrategy();
    const searchRadius = 18 + Math.floor(sharedStats.mind * 0.6);
    const candidates = [];

    for (let dy = -searchRadius; dy <= searchRadius; dy++) {
        for (let dx = -searchRadius; dx <= searchRadius; dx++) {
            const tx = avatarX + dx;
            const ty = avatarY + dy;
            if (tx === avatarX && ty === avatarY) continue;
            if (!isPassable(tx, ty)) continue;
            if (isReservedByOther(tx, ty)) continue;
            if (!canUseTarget(tx, ty)) continue;

            const state = getOrInitState(tx, ty);
            if (state.remaining <= 0) continue;

            const seed = getOrCreateSeed(tx, ty);
            if (seed.terrainClass === "structure") continue;
            const dist = Math.abs(dx) + Math.abs(dy);
            const moveCost = movementCostAt(tx, ty);
            const typeWeight = strategy.weights[seed.mainType] || 1;
            const amountFactor = state.remaining / seed.maxCapacity;
            const homePenalty = Math.max(0, (Math.abs(tx - HOME_X) + Math.abs(ty - HOME_Y) - 12) * 0.015);
            const terrainBonus = seed.terrainClass === "forest" && strategyId === "herb" ? 0.45 : seed.terrainClass === "mountain" && strategyId === "rare" ? 0.55 : 0;
            const heatPenalty = getChunkHeatAt(tx, ty) * 0.35;
            const score = typeWeight * (1.6 + amountFactor + terrainBonus) - dist * 0.085 - moveCost * 0.28 - homePenalty - heatPenalty;
            candidates.push({ x: tx, y: ty, score, seed, heat: getChunkHeatAt(tx, ty) });
        }
    }
    candidates.sort((a, b) => b.score - a.score);
    return candidates.slice(0, limit);
}

function shouldReturnHome() {
    if (isAtHome()) return false;
    const bagThreshold = Math.floor(avatarBagCap * bagReturnRatio);
    const bagLoad = totalInventoryLoad();
    if (bagLoad >= bagThreshold) return true;
    if (avatarHp <= Math.floor(getAvatarMaxHp() * BALANCE_CONFIG.combat.lowHpReturnRatio)) return true;
    if (avatarInventory.rareCrystal >= 3) return true;
    return false;
}

function depositAvatarInventoryToHome() {
    const moved = [];
    Object.keys(avatarInventory).forEach((key) => {
        const amount = avatarInventory[key];
        if (amount > 0) {
            homeInventory[key] += amount;
            avatarInventory[key] = 0;
            const name = RESOURCE_META[key]?.label || ITEM_DEFS[key]?.label || key;
            moved.push(`${name} ${amount}`);
        }
    });
    if (moved.length) {
        addLog(`化身已入库：${moved.join(" / ")}`);
        updateSidePanels();
        updateStatus();
        updateMovementStatus();
    }
    avatarHp = getAvatarMaxHp();
    avatarMp = getAvatarMaxMp();
}

function isWithinDailyMoveRadius(x, y) {
    const dx = x - dayOriginX;
    const dy = y - dayOriginY;
    return Math.hypot(dx, dy) <= DAILY_MOVE_RADIUS;
}

function hasValidExploreTarget() {
    if (!exploreTarget) return false;
    if (!isPassable(exploreTarget.x, exploreTarget.y)) return false;
    if (isReservedByOther(exploreTarget.x, exploreTarget.y)) return false;
    const seed = getOrCreateSeed(exploreTarget.x, exploreTarget.y);
    if (seed.terrainClass === "structure") return false;
    const state = getOrInitState(exploreTarget.x, exploreTarget.y);
    return state.remaining > 0;
}

function pickStepToward(targetX, targetY) {
    const candidates = [];
    const dx = targetX - avatarX;
    const dy = targetY - avatarY;

    if (dx !== 0) candidates.push({ x: avatarX + Math.sign(dx), y: avatarY });
    if (dy !== 0) candidates.push({ x: avatarX, y: avatarY + Math.sign(dy) });

    candidates.push({ x: avatarX + 1, y: avatarY });
    candidates.push({ x: avatarX - 1, y: avatarY });
    candidates.push({ x: avatarX, y: avatarY + 1 });
    candidates.push({ x: avatarX, y: avatarY - 1 });

    const deduped = [];
    const seen = new Set();
    for (const step of candidates) {
        const key = `${step.x},${step.y}`;
        if (!seen.has(key)) {
            seen.add(key);
            deduped.push(step);
        }
    }

    deduped.sort((a, b) => {
        const aDist = Math.abs(targetX - a.x) + Math.abs(targetY - a.y);
        const bDist = Math.abs(targetX - b.x) + Math.abs(targetY - b.y);
        const aCost = movementCostAt(a.x, a.y);
        const bCost = movementCostAt(b.x, b.y);
        return aDist - bDist || aCost - bCost;
    });

    return deduped.find((step) => isPassable(step.x, step.y) && movementCostAt(step.x, step.y) !== Infinity) || null;
}

function moveOneStep(targetX, targetY) {
    const step = pickStepToward(targetX, targetY);
    if (!step) {
        movementStatusText = "前方为大水或死路，改道失败";
        return false;
    }
    if (!isWithinDailyMoveRadius(step.x, step.y)) {
        movementStatusText = `今日活动半径已达 ${DAILY_MOVE_RADIUS} 格，返城中`;
        autoObjective = "return_home";
        return false;
    }

    avatarX = step.x;
    avatarY = step.y;
    lastMoveAtMs = simulationTimeMs;
    dayMoveCount += 1;
    dayMoveLogBatch += 1;
    if (dayMoveLogBatch >= 5 || autoObjective === "return_home") dayMoveLogBatch = 0;
    movementStatusText = `今日已移动 ${dayMoveCount} 格，当前位置 (${avatarX}, ${avatarY})`;
    return true;
}

function getGatherDurationMs(seed) {
    const terrainCost = seed.terrainClass === "mountain" ? 2200 : seed.terrainClass === "forest" ? 900 : 0;
    const refinementBonus = town.refinementLevel * 320 + sharedStats.control * 110 + sharedStats.spirit * 120;
    return Math.max(3800, BALANCE_CONFIG.timing.gatherBaseMs + terrainCost - refinementBonus);
}

function updateGatheringRing() {
    document.querySelectorAll(".gathering").forEach((el) => el.remove());
    if (!isGathering || !gatheringTarget) return;

    const cell = document.querySelector(`.cell[data-wx="${avatarX}"][data-wy="${avatarY}"]`);
    if (!cell) return;

    const ring = document.createElement("div");
    ring.className = "gathering";
    ring.innerHTML = `
        <svg class="progress-ring" width="56" height="56">
            <circle class="progress-ring__circle" stroke="#88ffaa" stroke-width="5" fill="transparent" r="23" cx="28" cy="28"
                stroke-dasharray="144.5" stroke-dashoffset="144.5"></circle>
        </svg>
        <div class="progress-text">${Math.ceil(gatherRemainingMs / 1000)}s</div>
    `;
    cell.appendChild(ring);
    const circle = ring.querySelector("circle");
    circle.style.strokeDashoffset = 144.5 * (1 - gatheringProgress);
}

function startGathering(tx, ty) {
    if (isGathering || avatarX !== tx || avatarY !== ty) return;
    const monster = getMonsterAt(tx, ty);
    if (monster) {
        startBattleWith(monster);
        return;
    }
    const state = getOrInitState(tx, ty);
    if (state.remaining <= 0) {
        addLog("此地灵机已枯竭");
        return;
    }

    const seed = getOrCreateSeed(tx, ty);
    if (!acquireReservation(tx, ty)) {
        addLog("目标地块已被其他化身占用，重新择点");
        markTargetBackoff(tx, ty);
        exploreTarget = null;
        return;
    }
    const resourceKey = resourceKeyFromSeed(seed);
    const unitWeight = resourceUnitWeight(resourceKey);
    const capacityLeft = avatarBagCap - totalInventoryLoad();
    if (capacityLeft < unitWeight) {
        addLog("化身背包已满，切换返城优先");
        releaseReservation(tx, ty);
        autoObjective = "return_home";
        exploreTarget = null;
        return;
    }
    isGathering = true;
    gatheringTarget = { x: tx, y: ty };
    exploreTarget = { x: tx, y: ty };
    gatherTotalMs = getGatherDurationMs(seed);
    gatherRemainingMs = gatherTotalMs;
    gatheringProgress = 0;
    addLog(`开始采集 ${RESOURCE_META[resourceKeyFromSeed(seed)].label}，预计 ${Math.ceil(gatherTotalMs / 1000)} 秒`);
    updateGatheringRing();
}

function finishGathering() {
    if (!gatheringTarget) return;

    const { x, y } = gatheringTarget;
    const state = getOrInitState(x, y);
    const seed = getOrCreateSeed(x, y);
    const harvestRoll = simpleHash(x + gatherCount * 17, y + dayCount * 29);
    const baseAmount = Math.min(2 + (harvestRoll % 5), state.remaining);
    const resourceKey = resourceKeyFromSeed(seed);
    const heat = getChunkHeatAt(x, y);
    const heatMultiplier = Math.max(0.35, 1 - heat * 0.06);
    const amountByHeat = Math.max(1, Math.floor(baseAmount * heatMultiplier));
    const unitWeight = resourceUnitWeight(resourceKey);
    const capacityLeft = Math.max(0, avatarBagCap - totalInventoryLoad());
    const maxByCap = Math.floor(capacityLeft / unitWeight);
    const amount = Math.max(0, Math.min(amountByHeat, maxByCap, state.remaining));

    if (amount > 0) {
        state.remaining -= amount;
        state.depletion += amount;
        avatarInventory[resourceKey] += amount;
        dayGatherUnits += amount;
        addChunkHeatAt(x, y, 1 + amount * 0.6);
        updateSidePanels();
        updateStatus();
        updateMovementStatus();
    } else {
        addLog("化身背包容量不足，本次未能采集");
    }

    gatherCount += 1;
    isGathering = false;
    gatherRemainingMs = 0;
    gatherTotalMs = 0;
    gatheringProgress = 0;
    gatheringTarget = null;
    releaseReservation(x, y);
    exploreTarget = null;
    document.querySelectorAll(".gathering").forEach((el) => el.remove());

    if (amount > 0) {
        addLog(`采集完成，获得 ${RESOURCE_META[resourceKey].label} ×${amount}（热度${heat.toFixed(1)}）`);
    }
    if (shouldReturnHome()) {
        autoObjective = "return_home";
    }
}

function tryRefineAtHome(autoTriggered = false) {
    if (dayRefineCount >= town.refinementLevel) {
        if (!autoTriggered) {
            addLog(`今日炼化次数已达上限（${town.refinementLevel}）`);
        }
        return false;
    }

    const spiritNeed = 20 + cultivationLevel * 8;
    const herbNeed = 8 + cultivationLevel * 2;
    const woodNeed = 6 + cultivationLevel * 2;
    const rareNeed = cultivationLevel >= 3 ? 1 : 0;
    const useCoreElixir = (homeInventory.coreElixir || 0) > 0;
    const useStarShard = (homeInventory.starShard || 0) > 0 && cultivationLevel >= 4;
    const spiritNeedAdj = Math.max(0, spiritNeed - (useCoreElixir ? 8 : 0) - (useStarShard ? 12 : 0));
    const herbNeedAdj = Math.max(0, herbNeed - (useCoreElixir ? 2 : 0));
    const woodNeedAdj = Math.max(0, woodNeed - (useStarShard ? 2 : 0));

    if (
        homeInventory.spiritStone < spiritNeedAdj ||
        homeInventory.herb < herbNeedAdj ||
        homeInventory.wood < woodNeedAdj ||
        homeInventory.rareCrystal < rareNeed
    ) {
        if (!autoTriggered) {
            addLog(`炼化材料不足，需要 灵石${spiritNeedAdj}/灵草${herbNeedAdj}/灵木${woodNeedAdj}${rareNeed ? `/异晶${rareNeed}` : ""}`);
        }
        return false;
    }

    homeInventory.spiritStone -= spiritNeedAdj;
    homeInventory.herb -= herbNeedAdj;
    homeInventory.wood -= woodNeedAdj;
    homeInventory.rareCrystal -= rareNeed;
    if (useCoreElixir) homeInventory.coreElixir -= 1;
    if (useStarShard) homeInventory.starShard -= 1;
    cultivationLevel += 1;
    dayRefineCount += 1;
    town.refinementLevel += 1;
    town.prosperity += 1;
    town.storageCap += 18;
    sharedStats.level += 1;
    sharedStats.spirit += 1;
    sharedStats.fortune += 1;
    sharedStats.freePoints += 1;
    addLog(`洞府炼化成功，境界提升至 ${getRealmName()}，仓储上限 ${town.storageCap}`);
    return true;
}

function autoExploreStep() {
    if (isGathering) return;
    if (battleState) {
        resolveBattleStep();
        return;
    }

    if (autoObjective === "return_home") {
        releaseExploreTargetReservation();
        exploreTarget = null;
        if (isAtHome()) {
            addLog("已返回洞府，开始整备");
            depositAvatarInventoryToHome();
            tryRefineAtHome(true);
            avatarHp = getAvatarMaxHp();
            avatarMp = getAvatarMaxMp();
            autoObjective = "explore";
            return;
        }
        moveOneStep(HOME_X, HOME_Y);
        return;
    }

    if (shouldReturnHome()) {
        releaseExploreTargetReservation();
        exploreTarget = null;
        autoObjective = "return_home";
        addLog("背包偏重，切换为返城优先");
        return;
    }

    if (!hasValidExploreTarget()) {
        releaseExploreTargetReservation();
        const pool = chooseResourceTargets(TARGET_POOL_SIZE);
        exploreTarget = null;
        for (const candidate of pool) {
            if (acquireReservation(candidate.x, candidate.y)) {
                exploreTarget = candidate;
                break;
            }
            markTargetBackoff(candidate.x, candidate.y);
        }
    } else if (exploreTarget) {
        if (!acquireReservation(exploreTarget.x, exploreTarget.y)) {
            markTargetBackoff(exploreTarget.x, exploreTarget.y);
            exploreTarget = null;
        }
    }

    const target = exploreTarget;
    if (!target) {
        addLog("附近暂未发现值得采集的资源点，返城待命");
        autoObjective = "return_home";
        return;
    }

    if (avatarX === target.x && avatarY === target.y) {
        startGathering(target.x, target.y);
        return;
    }

    moveOneStep(target.x, target.y);
    const encountered = getMonsterAt(avatarX, avatarY);
    if (encountered) {
        startBattleWith(encountered);
    }
}

function formatCostLine(cost) {
    if (!cost) return "无";
    const parts = [];
    if (cost.spiritStone) parts.push(`灵石 ${cost.spiritStone}`);
    if (cost.wood) parts.push(`灵木 ${cost.wood}`);
    if (cost.herb) parts.push(`灵草 ${cost.herb}`);
    if (cost.rareCrystal) parts.push(`异晶 ${cost.rareCrystal}`);
    return parts.join(" / ");
}

function formatCostStockLine(cost) {
    if (!cost) return '<div class="mat-line"><span class="mat-item mat-ok">无消耗</span></div>';
    const specs = [
        { key: "spiritStone", label: "灵石" },
        { key: "wood", label: "灵木" },
        { key: "herb", label: "灵草" },
        { key: "rareCrystal", label: "异晶" }
    ];
    const parts = [];
    for (const spec of specs) {
        const need = cost[spec.key] || 0;
        if (need <= 0) continue;
        const have = homeInventory[spec.key] || 0;
        const ok = have >= need;
        parts.push(`<span class="mat-item ${ok ? "mat-ok" : "mat-bad"}">${spec.label} ${have}/${need}</span>`);
    }
    return `<div class="mat-line">${parts.join("")}</div>`;
}

function canAffordCost(cost) {
    if (!cost) return true;
    return (
        homeInventory.spiritStone >= (cost.spiritStone || 0) &&
        homeInventory.wood >= (cost.wood || 0) &&
        homeInventory.herb >= (cost.herb || 0) &&
        homeInventory.rareCrystal >= (cost.rareCrystal || 0)
    );
}

function closeBuildPanel() {
    buildPanel.classList.add("hidden");
    buildPanel.innerHTML = "";
    buildPanelTile = null;
    if (isBuildFocus) {
        isBuildFocus = false;
        addLog("已退出洞府建设视图");
        renderAll();
    }
}

function performHomeBuildAction(wx, wy, action, targetType = null) {
    if (!isHomeBuildTile(wx, wy)) {
        addLog("只能在洞府 5x5 范围内建设");
        return false;
    }
    if (isGathering || isMeditating) {
        addLog("当前行为进行中，暂不能建设");
        return false;
    }

    const current = getHomeBuilding(wx, wy);
    if (action === "inspect") {
        if (current) {
            const conf = getBuildingConfig(current.type);
            addLog(`该地块：${conf ? conf.label : current.type} Lv.${current.level}`);
        } else {
            addLog("该地块为空地");
        }
        return true;
    }
    if (action === "remove") {
        if (!current) {
            addLog("该地块没有建筑可拆除");
            return false;
        }
        const refundStone = 10 * current.level;
        homeInventory.spiritStone += refundStone;
        setHomeBuilding(wx, wy, null);
        addLog(`拆除完成，返还灵石 ${refundStone}`);
        return true;
    }
    if (action === "upgrade") {
        if (!current) {
            addLog("该地块为空，无法升级");
            return false;
        }
        const conf = getBuildingConfig(current.type);
        const upgradeCost = conf ? conf.upgradeCost : null;
        if (!applyCost(upgradeCost)) {
            addLog("升级材料不足");
            return false;
        }
        current.level += 1;
        setHomeBuilding(wx, wy, current);
        addLog(`${conf ? conf.label : current.type} 升级到 Lv.${current.level}`);
        return true;
    }

    if (action !== "build") return false;
    const conf = getBuildingConfig(targetType);
    if (!conf || conf.id === "none") return false;
    if (current) {
        addLog("该地块已有建筑，请先拆除或切换升级模式");
        return false;
    }
    if (!applyCost(conf.buildCost)) {
        addLog(`建造 ${conf.label} 材料不足`);
        return false;
    }
    setHomeBuilding(wx, wy, { type: conf.id, level: 1 });
    addLog(`建造完成：${conf.label} Lv.1`);
    return true;
}

function openBuildPanel(wx, wy) {
    if (!isHomeBuildTile(wx, wy)) return;
    if (zoomLevel > 1) zoomLevel = 1;
    isBuildFocus = true;
    buildPanelTile = { x: wx, y: wy };

    const current = getHomeBuilding(wx, wy);
    const currentTitle = current
        ? `${getBuildingConfig(current.type)?.label || current.type} Lv.${current.level}`
        : "空地";

    let html = `<div style="font-weight:700; margin-bottom:6px;">洞府建设面板</div>`;
    html += `<div class="build-meta">主角驻守洞府执事中，支持远程建设（化身可在外探索）</div>`;
    html += `<div class="build-meta">目标瓦片: (${wx}, ${wy}) · 当前建筑: ${currentTitle}</div>`;
    html += `<div class="build-meta" style="margin:6px 0 10px;">洞府库存: 灵石 ${homeInventory.spiritStone} / 灵木 ${homeInventory.wood} / 灵草 ${homeInventory.herb} / 异晶 ${homeInventory.rareCrystal}</div>`;

    if (current) {
        const conf = getBuildingConfig(current.type);
        const canUpgrade = canAffordCost(conf?.upgradeCost);
        html += `
            <div class="build-row">
                <div>
                    <div><strong>升级 ${conf ? conf.label : current.type}</strong></div>
                    <div class="build-meta">需求: ${formatCostLine(conf?.upgradeCost)}</div>
                    ${formatCostStockLine(conf?.upgradeCost)}
                    <div class="build-meta ${canUpgrade ? "" : "mini-meta-warn"}">${canUpgrade ? "库存满足" : "材料不足，点击可查看提示"}</div>
                    <div class="build-meta">效果: ${conf?.effect || "-"}</div>
                </div>
                <button class="mini-btn" data-build-action="upgrade">升级</button>
            </div>
            <div class="build-row">
                <div>
                    <div><strong>拆除建筑</strong></div>
                    <div class="build-meta">返还: 灵石 ${10 * current.level}</div>
                </div>
                <button class="mini-btn" data-build-action="remove">拆除</button>
            </div>
        `;
    } else {
        for (const conf of BUILDING_TYPES.filter((item) => item.id !== "none")) {
            const canBuild = canAffordCost(conf.buildCost);
            html += `
                <div class="build-row">
                    <div>
                        <div><strong>${conf.icon} ${conf.label}</strong></div>
                        <div class="build-meta">需求: ${formatCostLine(conf.buildCost)}</div>
                        ${formatCostStockLine(conf.buildCost)}
                        <div class="build-meta ${canBuild ? "" : "mini-meta-warn"}">${canBuild ? "库存满足" : "材料不足，点击可查看提示"}</div>
                        <div class="build-meta">效果: ${conf.effect}</div>
                    </div>
                    <button class="mini-btn" data-build-action="build" data-build-type="${conf.id}">建造</button>
                </div>
            `;
        }
    }
    html += `<div style="display:flex; gap:8px; margin-top:10px;"><button class="mini-btn" data-build-action="inspect">查看</button><button class="mini-btn" data-build-action="close">关闭</button></div>`;

    buildPanel.innerHTML = html;
    buildPanel.classList.remove("hidden");

    buildPanel.querySelectorAll("button[data-build-action]").forEach((btn) => {
        btn.addEventListener("click", () => {
            const action = btn.dataset.buildAction;
            const type = btn.dataset.buildType || null;
            if (!buildPanelTile) return;
            if (action === "close") {
                closeBuildPanel();
                return;
            }
            const ok = performHomeBuildAction(buildPanelTile.x, buildPanelTile.y, action, type);
            if (ok || action === "inspect") {
                openBuildPanel(buildPanelTile.x, buildPanelTile.y);
                renderAll();
            }
        });
    });
}

function getChunkInfo(cx, cy, span) {
    const terrain = getTerrainClass(cx, cy);
    const seed = getOrCreateSeed(cx, cy);
    const state = getOrInitState(cx, cy);
    const includesHome = Math.abs(cx - HOME_X) <= Math.floor(span / 2) && Math.abs(cy - HOME_Y) <= Math.floor(span / 2);
    return { terrain, seed, state, includesHome };
}

function formatChunkTooltip(wx, wy, span) {
    const info = getChunkInfo(wx, wy, span);
    const terrainLabel = TERRAIN_RULES[info.terrain].label;
    const resourceKey = resourceKeyFromSeed(info.seed);
    const heat = getChunkHeatAt(wx, wy);
    let text = span === 1 ? `坐标: (${wx}, ${wy})\n` : `地块中心: (${wx}, ${wy})\n覆盖范围: ${span}x${span}\n`;
    text += `地形: ${terrainLabel}\n`;
    text += `主资源: ${RESOURCE_META[resourceKey].label}\n`;
    text += `剩余: ${info.state.remaining}/${info.seed.maxCapacity}`;
    text += `\n区域热度: ${heat.toFixed(1)}`;
    if (!TERRAIN_RULES[info.terrain].passable) {
        text += `\n此地不可通行`;
    } else {
        text += `\n移动消耗: ${TERRAIN_RULES[info.terrain].moveCost}`;
    }
    if (info.includesHome) {
        text += `\n此区域包含洞府`;
    }
    if (span === 1 && isHomeBuildTile(wx, wy)) {
        const building = getHomeBuilding(wx, wy);
        if (building) {
            const conf = getBuildingConfig(building.type);
            text += `\n洞府建筑: ${conf ? conf.label : building.type} Lv.${building.level}`;
        } else {
            text += `\n洞府建筑: 空地`;
        }
    }
    if (span === 1) {
        const reservation = getReservationAt(wx, wy);
        if (reservation) {
            text += `\n占位状态: ${reservation.owner === PLAYER_ID ? "本地占用" : "他人占用"}`;
        }
        const monster = getMonsterAt(wx, wy);
        if (monster) {
            text += `\n妖物: ${monster.type} Lv.${monster.level} HP ${monster.hp}/${monster.maxHp}`;
            const profile = getMonsterDropProfile(monster.type);
            if (profile) {
                text += `\n掉落率: ${profile.drops.map((d) => `${ITEM_DEFS[d.id]?.label || d.id} ${d.chance}`).join(" / ")}`;
            }
        }
    }
    return text;
}

function updateHeader() {
    document.getElementById("coord-x").textContent = avatarX;
    document.getElementById("coord-y").textContent = avatarY;
    document.getElementById("zoom-label").textContent = ZOOM_LEVELS[zoomLevel].label;
    document.getElementById("day-count").textContent = dayCount;
    document.getElementById("realm-name").textContent = getRealmName();
}

function renderMap() {
    const cfg = ZOOM_LEVELS[zoomLevel];
    const half = Math.floor(cfg.size / 2);
    const centerX = isBuildFocus ? HOME_X : avatarX;
    const centerY = isBuildFocus ? HOME_Y : avatarY;
    grid.style.gridTemplateColumns = `repeat(${cfg.size}, ${cfg.cellPx}px)`;
    grid.style.gridTemplateRows = `repeat(${cfg.size}, ${cfg.cellPx}px)`;
    grid.innerHTML = "";

    for (let gy = -half; gy <= half; gy++) {
        for (let gx = -half; gx <= half; gx++) {
            const wx = centerX + gx * cfg.span;
            const wy = centerY + gy * cfg.span;
            const info = getChunkInfo(wx, wy, cfg.span);
            const resourceKey = resourceKeyFromSeed(info.seed);

            const cell = document.createElement("div");
            cell.className = `cell ${info.terrain}${TERRAIN_RULES[info.terrain].passable ? "" : " impassable"}`;
            cell.dataset.wx = wx;
            cell.dataset.wy = wy;
            cell.dataset.span = cfg.span;
            if (cfg.span === 1 && isHomeBuildTile(wx, wy)) {
                cell.classList.add("home-build-zone");
                if (wy === HOME_Y - HOME_BUILD_RADIUS) cell.classList.add("home-edge-top");
                if (wy === HOME_Y + HOME_BUILD_RADIUS) cell.classList.add("home-edge-bottom");
                if (wx === HOME_X - HOME_BUILD_RADIUS) cell.classList.add("home-edge-left");
                if (wx === HOME_X + HOME_BUILD_RADIUS) cell.classList.add("home-edge-right");
            }

            if (wx === avatarX && wy === avatarY) {
                if (gx === 0 && gy === 0) cell.dataset.center = "true";
                const visual = getAvatarVisualState();
                const av = document.createElement("div");
                av.className = `avatar ${visual.css}`;
                av.innerHTML = `<span class="avatar-main">${cfg.span <= 2 ? "🧍" : "◉"}</span><span class="avatar-badge">${visual.badge}</span>`;
                cell.appendChild(av);
            }

            if (wx === HOME_X && wy === HOME_Y) {
                const host = document.createElement("div");
                host.className = "home-tag";
                host.textContent = "主";
                cell.appendChild(host);
            }

            if (cfg.span >= 4 && cfg.span < 16) {
                const chunkTag = document.createElement("div");
                chunkTag.className = "chunk-tag";
                chunkTag.textContent = cfg.span >= 16 ? "群" : "区";
                cell.appendChild(chunkTag);
            }

            if (info.includesHome) {
                const homeTag = document.createElement("div");
                homeTag.className = "home-tag";
                homeTag.textContent = "⌂";
                cell.appendChild(homeTag);
            }

            if (cfg.span === 1 && isHomeBuildTile(wx, wy)) {
                const building = getHomeBuilding(wx, wy);
                if (building) {
                    const conf = getBuildingConfig(building.type);
                    const tag = document.createElement("div");
                    tag.className = "chunk-tag";
                    tag.textContent = `${conf ? conf.icon : "□"}${building.level}`;
                    tag.style.left = "auto";
                    tag.style.right = "2px";
                    tag.style.top = "2px";
                    cell.appendChild(tag);
                }
            }

            if (info.state.remaining > 0 && cfg.span < 16) {
                const tag = document.createElement("div");
                tag.className = "resource-tag";
                tag.textContent = RESOURCE_META[resourceKey].icon;
                tag.style.opacity = String(Math.max(0.35, info.state.remaining / info.seed.maxCapacity));
                cell.appendChild(tag);
            }

            if (autoObjective === "return_home" && info.includesHome) {
                const targetTag = document.createElement("div");
                targetTag.className = "target-tag";
                targetTag.textContent = "归";
                cell.appendChild(targetTag);
            } else if (exploreTarget && exploreTarget.x === wx && exploreTarget.y === wy && cfg.span === 1) {
                const targetTag = document.createElement("div");
                targetTag.className = "target-tag";
                targetTag.textContent = "采";
                cell.appendChild(targetTag);
            } else if (cfg.span === 1) {
                const monster = getMonsterAt(wx, wy);
                if (monster) {
                    cell.classList.add("monster-cell");
                    if (monster.type === "精英妖将") cell.classList.add("monster-elite");
                    if (monster.type === "天劫妖王") cell.classList.add("monster-boss");
                    const targetTag = document.createElement("div");
                    targetTag.className = "target-tag";
                    targetTag.textContent = monster.type === "天劫妖王" ? "王" : monster.type === "精英妖将" ? "精" : "妖";
                    cell.appendChild(targetTag);
                } else {
                    const reservation = getReservationAt(wx, wy);
                    if (reservation) {
                        const targetTag = document.createElement("div");
                        targetTag.className = "target-tag";
                        targetTag.textContent = reservation.owner === PLAYER_ID ? "占" : "锁";
                        cell.appendChild(targetTag);
                    }
                }
            }

            grid.appendChild(cell);
        }
    }

    updateHeader();
    updateGatheringRing();
}

function updateCultivationPanel() {
    const tickProgress = Math.max(0, Math.min(1, bodyCultivationAccumMs / BODY_CULTIVATION_TICK_MS));
    if (cultivationTickRingEl) {
        cultivationTickRingEl.style.strokeDashoffset = String(138.2 * (1 - tickProgress));
        cultivationTickRingEl.style.stroke = bodyCultivationExp >= getBodyCultivationExpNeed(cultivationLevel) && heavenlyEssence >= getBreakthroughEssenceNeed()
            ? "#ffd36f"
            : "#8fd9ff";
    }
    if (cultivationMetaEl) {
        cultivationMetaEl.innerHTML = `
            境界 ${getRealmName()} · 修为 ${bodyCultivationExp}/${getBodyCultivationExpNeed(cultivationLevel)}<br>
            打坐 ${isMeditating ? `进行中 ${Math.ceil(meditateRemainingMs / 1000)}s` : "待机"} · 下次修炼结算 ${Math.max(1, Math.ceil((BODY_CULTIVATION_TICK_MS - bodyCultivationAccumMs) / 1000))}s<br>
            突破需求：天地精华 ${heavenlyEssence}/${getBreakthroughEssenceNeed()} · 效率 x${getCultivationRateMultiplier().toFixed(1)}
        `;
    }
    if (breakthroughBtn) {
        const canBreak = bodyCultivationExp >= getBodyCultivationExpNeed(cultivationLevel) && heavenlyEssence >= getBreakthroughEssenceNeed();
        breakthroughBtn.disabled = !canBreak;
    }
    if (autoBreakthroughToggle) {
        autoBreakthroughToggle.checked = autoBreakthrough;
    }
}

function updateBattlePanel() {
    if (!battleState) {
        battlePanelEl.classList.add("hidden");
        return;
    }
    const profile = getMonsterDropProfile(battleState.type);
    const dropPreview = profile ? profile.drops.map((d) => `${ITEM_DEFS[d.id]?.label || d.id} ${d.chance}`).join(" / ") : "灵石 100%";
    const enemyPct = Math.max(0, Math.round((battleState.hp / Math.max(1, battleState.maxHp)) * 100));
    const selfPct = Math.max(0, Math.round((avatarHp / Math.max(1, getAvatarMaxHp())) * 100));
    const detail = lastBattleFrame
        ? `R${lastBattleFrame.round} ${lastBattleFrame.tactic}｜我方${lastBattleFrame.avatarHit ? "命中" : "未中"}${lastBattleFrame.crit ? "(暴击)" : ""} ${lastBattleFrame.avatarDmg}｜敌方${lastBattleFrame.monsterHit ? "命中" : "未中"} ${lastBattleFrame.monsterDmg}｜命中检定 ${lastBattleFrame.hitRoll} / 闪避检定 ${lastBattleFrame.dodgeRoll}`
        : "等待首回合结算...";
    battleSummaryEl.innerHTML = `⚔ ${battleState.type} Lv.${battleState.level} · 回合 ${battleState.rounds}<br>

function updateSimulation(ms) {
    const scaledMs = ms * timeScale;
    simulationTimeMs += scaledMs;
    bodyCultivationAccumMs += scaledMs;
    updateCultivationPanel();
    while (bodyCultivationAccumMs >= BODY_CULTIVATION_TICK_MS) {
        bodyCultivationAccumMs -= BODY_CULTIVATION_TICK_MS;
        applyBodyCultivationTick();
        renderAll();
    }
    cleanupReservations();
    buildingProductionAccumMs += scaledMs;
    while (buildingProductionAccumMs >= BALANCE_CONFIG.timing.buildingTickMs) {
        buildingProductionAccumMs -= BALANCE_CONFIG.timing.buildingTickMs;
        runBuildingProductionTick();
        renderAll();
    }

    if (isMeditating) {
        meditateRemainingMs = Math.max(0, meditateRemainingMs - scaledMs);
        if (meditateRemainingMs <= 0) {
            finishMeditation();
            renderAll();
        }
    }

    if (isGathering) {
        gatherRemainingMs = Math.max(0, gatherRemainingMs - scaledMs);
        gatheringProgress = gatherTotalMs === 0 ? 0 : 1 - gatherRemainingMs / gatherTotalMs;
        updateGatheringRing();
        if (gatherRemainingMs <= 0) {
            finishGathering();
            renderAll();
        }
    }

    if (!battleState) {
        avatarMp = Math.min(getAvatarMaxMp(), avatarMp + scaledMs * 0.0032);
    }

    if (isAutoMode && !isGathering) {
        autoAccumulatorMs += scaledMs;
        const stepMs = battleState ? BALANCE_CONFIG.timing.battleStepMs : BALANCE_CONFIG.timing.autoStepMs;
        while (autoAccumulatorMs >= stepMs) {
            autoAccumulatorMs -= stepMs;
            autoExploreStep();
            renderAll();
            if (isGathering) break;
        }
    }
}

function renderGameToText() {
    const cfg = ZOOM_LEVELS[zoomLevel];
    const visible = [];
    const sampleRadius = cfg.span === 1 ? 2 : 1;
    for (let dy = -sampleRadius; dy <= sampleRadius; dy++) {
        for (let dx = -sampleRadius; dx <= sampleRadius; dx++) {
            const x = avatarX + dx * cfg.span;
            const y = avatarY + dy * cfg.span;
            const seed = getOrCreateSeed(x, y);
            const state = getOrInitState(x, y);
            const monster = getMonsterAt(x, y);
            visible.push({
                x,
                y,
                terrain: getTerrainClass(x, y),
                resource: seed.mainType,
                remaining: state.remaining,
                monster: monster ? { type: monster.type, level: monster.level, hp: monster.hp, maxHp: monster.maxHp } : null
            });
        }
    }

    const reservations = reservationBackend.list();
    const backoffTargets = [];
    targetBackoffMap.forEach((entry, key) => {
        const [x, y] = key.split(",").map(Number);
        backoffTargets.push({ x, y, ttlMs: Math.max(0, Math.floor(entry.untilMs - simulationTimeMs)), failCount: entry.failCount });
    });
    const homeBuildings = [];
    homeBuildingMap.forEach((building, key) => {
        const [x, y] = key.split(",").map(Number);
        homeBuildings.push({ x, y, type: building.type, level: building.level });
    });

    return JSON.stringify({
        coordinateSystem: "origin at world tile (0,0); x increases east/right, y increases south/down",
        mode: battleState ? "battle" : isGathering ? "gathering" : isAutoMode ? autoObjective : "idle",
        day: dayCount,
        timeScale,
        zoom: { label: cfg.label, span: cfg.span, size: cfg.size },
        player: {
            x: avatarX,
            y: avatarY,
            hp: avatarHp,
            maxHp: getAvatarMaxHp(),
            mp: Math.floor(avatarMp),
            maxMp: getAvatarMaxMp(),
            realm: getRealmName(),
            strategy: strategyId,
            distanceToHome: distanceToHome(),
            sharedStats: { ...sharedStats },
            battleTacticId,
            autoBreakthrough,
            autoUsePillRatio,
            autoUseSalveRatio,
            injuryDebuffRemainMs: Math.max(0, Math.floor(injuryDebuffUntilMs - simulationTimeMs)),
            bodyCultivationExp,
            bodyCultivationExpNeed: getBodyCultivationExpNeed(cultivationLevel),
            cultivationRateMultiplier: getCultivationRateMultiplier(),
            heavenlyEssence
        },
        town,
        currencies: { goldCoins },
        avatarInventory,
        homeInventory,
        equipmentInventory,
        equipmentEnhanceLevels,
        equipmentBonus: getEquipmentBonus(),
        combatStats: getAvatarCombatSnapshot(),
        devFlags: { forceMonster: devForceMonster, fixedDrops: devFixedDrops, baitBoostRemainingMs: Math.max(0, Math.floor(baitBoostUntilMs - simulationTimeMs)) },
        monsterCodex: MONSTER_CODEX,
        craftRecipes: CRAFT_RECIPES,
        economy: {
            totalLoad: totalInventoryLoad(),
            avatarBagCap,
            bagReturnThreshold: Math.floor(avatarBagCap * bagReturnRatio),
            storageCap: town.storageCap,
            dayGatherUnits,
            gatherPerMinute: Number((dayGatherUnits / Math.max(1 / 60, (simulationTimeMs - dayStartMs) / 60000)).toFixed(2)),
            dayRefineCount,

        },

function applySavePayload(payload) {
    if (!payload || (payload.v && ![1, 2].includes(payload.v))) return false;
    avatarX = payload.avatar?.x ?? avatarX;
    avatarY = payload.avatar?.y ?? avatarY;
    avatarHp = payload.avatar?.hp ?? avatarHp;
    avatarMp = payload.avatar?.mp ?? avatarMp;
    dayCount = payload.day?.dayCount ?? dayCount;
    dayOriginX = payload.day?.dayOriginX ?? dayOriginX;
    dayOriginY = payload.day?.dayOriginY ?? dayOriginY;
    dayMoveCount = payload.day?.dayMoveCount ?? dayMoveCount;
    dayMoveLogBatch = payload.day?.dayMoveLogBatch ?? dayMoveLogBatch;
    dayGatherUnits = payload.day?.dayGatherUnits ?? dayGatherUnits;
    dayStartMs = payload.day?.dayStartMs ?? dayStartMs;
    dayRefineCount = payload.day?.dayRefineCount ?? dayRefineCount;
    zoomLevel = payload.runtime?.zoomLevel ?? zoomLevel;
    strategyId = payload.runtime?.strategyId ?? strategyId;
    autoObjective = payload.runtime?.autoObjective ?? autoObjective;
    isAutoMode = payload.runtime?.isAutoMode ?? isAutoMode;
    timeScale = payload.runtime?.timeScale ?? timeScale;
    simulationTimeMs = payload.runtime?.simulationTimeMs ?? simulationTimeMs;
    buildingProductionAccumMs = payload.runtime?.buildingProductionAccumMs ?? buildingProductionAccumMs;
    battleTacticId = payload.combat?.battleTacticId ?? battleTacticId;
    autoUsePillRatio = payload.combat?.autoUsePillRatio ?? autoUsePillRatio;
    autoUseSalveRatio = payload.combat?.autoUseSalveRatio ?? autoUseSalveRatio;
    injuryDebuffUntilMs = payload.combat?.injuryDebuffUntilMs ?? injuryDebuffUntilMs;
    lastBattleFrame = payload.combat?.lastBattleFrame ?? lastBattleFrame;
    devForceMonster = payload.flags?.devForceMonster ?? devForceMonster;
    devFixedDrops = payload.flags?.devFixedDrops ?? devFixedDrops;
    baitBoostUntilMs = payload.flags?.baitBoostUntilMs ?? baitBoostUntilMs;
    cultivationLevel = payload.progression?.cultivationLevel ?? cultivationLevel;
    meditationLevel = payload.progression?.meditationLevel ?? meditationLevel;
    meditationExp = payload.progression?.meditationExp ?? meditationExp;
    goldCoins = payload.progression?.goldCoins ?? goldCoins;
    bodyCultivationExp = payload.progression?.bodyCultivationExp ?? bodyCultivationExp;
    bodyCultivationAccumMs = payload.progression?.bodyCultivationAccumMs ?? bodyCultivationAccumMs;
    heavenlyEssence = payload.progression?.heavenlyEssence ?? heavenlyEssence;
    cultivationBuffUntilMs = payload.progression?.cultivationBuffUntilMs ?? cultivationBuffUntilMs;
    autoBreakthrough = payload.progression?.autoBreakthrough ?? autoBreakthrough;
    Object.assign(equipmentEnhanceLevels, payload.progression?.equipmentEnhanceLevels || {});
    Object.assign(sharedStats, payload.progression?.sharedStats || {});
    Object.keys(avatarInventory).forEach((k) => { avatarInventory[k] = 0; });
    Object.keys(homeInventory).forEach((k) => { homeInventory[k] = 0; });
    Object.keys(equipmentInventory).forEach((k) => { equipmentInventory[k] = 0; });
    Object.assign(avatarInventory, payload.inventories?.avatar || {});
    Object.assign(homeInventory, payload.inventories?.home || {});
    Object.assign(equipmentInventory, payload.inventories?.equipment || {});
    Object.assign(town, payload.town || {});
    rightPanelTab = payload.ui?.rightPanelTab || rightPanelTab;
    inspectText = payload.ui?.inspectText || "";
    reservationMap.clear();
    homeBuildingMap.clear();
    seedMap.clear();
    stateMap.clear();
    chunkHeatMap.clear();
    monsterStateMap.clear();
    targetBackoffMap.clear();
    (payload.maps?.reservations || []).forEach((r) => reservationBackend.acquire(r.x, r.y, r.owner || PLAYER_ID, Math.max(1, r.ttlMs || RESERVATION_TTL_MS)));
    (payload.maps?.homeBuildings || []).forEach(([k, v]) => homeBuildingMap.set(k, v));
    (payload.maps?.seedEntries || []).forEach(([k, v]) => seedMap.set(k, v));
    (payload.maps?.stateEntries || []).forEach(([k, v]) => stateMap.set(k, v));
    (payload.maps?.heatEntries || []).forEach(([k, v]) => chunkHeatMap.set(k, v));
    (payload.maps?.monsterEntries || []).forEach(([k, v]) => monsterStateMap.set(k, v));
    (payload.maps?.backoffEntries || []).forEach(([k, v]) => targetBackoffMap.set(k, v));
    discoveredItemSet.clear();
    (payload.discoveredItems || []).forEach((id) => discoveredItemSet.add(id));
    forceMonsterToggle.checked = devForceMonster;
    fixedDropToggle.checked = devFixedDrops;
    pillThresholdInput.value = String(Math.round(autoUsePillRatio * 100));
    salveThresholdInput.value = String(Math.round(autoUseSalveRatio * 100));
    pillThresholdLabel.textContent = String(Math.round(autoUsePillRatio * 100));
    salveThresholdLabel.textContent = String(Math.round(autoUseSalveRatio * 100));
    return true;
}

function saveToLocal() {
    try {
        localStorage.setItem(SAVE_KEY, JSON.stringify(buildSavePayload()));
        return true;
    } catch {
        return false;
    }
}

function loadFromLocal() {
    try {
        const candidates = [SAVE_KEY, "simpleworld_save_v1"];
        for (const key of candidates) {
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            const payload = JSON.parse(raw);
            if (applySavePayload(payload)) {
                if (key !== SAVE_KEY) saveToLocal();
                return true;
            }
        }
        return false;
    } catch {
        return false;
    }
}

function advanceTime(ms) {
    const step = 100;
    let remaining = ms;
    while (remaining > 0) {
        const delta = Math.min(step, remaining);
        updateSimulation(delta);
        remaining -= delta;
    }
    renderAll();
}

autoBtn.addEventListener("click", () => {
    if (isBuildFocus) closeBuildPanel();
    isAutoMode = !isAutoMode;
    if (!isAutoMode) {
        releaseExploreTargetReservation();
        exploreTarget = null;
    }
    addLog(isAutoMode ? "自动探索已启动" : "自动探索已停止");
    renderAll();
});

returnBtn.addEventListener("click", () => {
    if (isBuildFocus) closeBuildPanel();
    releaseExploreTargetReservation();
    exploreTarget = null;
    autoObjective = "return_home";
    isAutoMode = true;
    addLog("切换为返城优先，化身将沿路返回洞府");
    renderAll();
});

refineBtn.addEventListener("click", () => {
    tryRefineAtHome(false);
    renderAll();
});

meditateBtn.addEventListener("click", () => {
    if (isMeditating) {
        isMeditating = false;
        meditateRemainingMs = 0;
        meditateTotalMs = 0;
        addLog("已中止打坐");
    } else {
        startMeditation();
    }
    renderAll();
});

breakthroughBtn.addEventListener("click", () => {

craftCloseBtn.addEventListener("click", () => {

});

shopBtn.addEventListener("click", () => {

});

shopCloseBtn.addEventListener("click", () => {
    shopPanelEl.classList.add("hidden");
});

enhanceBtn.addEventListener("click", () => {
    enhancePanelEl.classList.remove("hidden");

enhanceCloseBtn.addEventListener("click", () => {

});

if (bagCapInput && bagCapLabel) {
    bagCapInput.addEventListener("input", () => {
        avatarBagCap = Number(bagCapInput.value);

        renderAll();

if (bagReturnInput && bagReturnLabel) {

        bagReturnRatio = Number(bagReturnInput.value) / 100;
        bagReturnLabel.textContent = String(Math.round(bagReturnRatio * 100));

    });
}

pillThresholdInput.addEventListener("input", () => {
    autoUsePillRatio = Number(pillThresholdInput.value) / 100;
    pillThresholdLabel.textContent = String(Math.round(autoUsePillRatio * 100));
    if (autoUseSalveRatio >= autoUsePillRatio) {
        autoUseSalveRatio = Math.max(0.1, autoUsePillRatio - 0.08);
        salveThresholdInput.value = String(Math.round(autoUseSalveRatio * 100));
        salveThresholdLabel.textContent = String(Math.round(autoUseSalveRatio * 100));
    }
    renderAll();
});

salveThresholdInput.addEventListener("input", () => {
    autoUseSalveRatio = Number(salveThresholdInput.value) / 100;
    salveThresholdLabel.textContent = String(Math.round(autoUseSalveRatio * 100));
    if (autoUseSalveRatio >= autoUsePillRatio) {
        autoUsePillRatio = Math.min(0.9, autoUseSalveRatio + 0.08);
        pillThresholdInput.value = String(Math.round(autoUsePillRatio * 100));
        pillThresholdLabel.textContent = String(Math.round(autoUsePillRatio * 100));
    }
    renderAll();
});

forceMonsterToggle.addEventListener("change", () => {

    addLog(`测试开关：强制刷怪 ${devForceMonster ? "开启" : "关闭"}`);

debugBattleBtn.addEventListener("click", () => {
    if (isGathering) return;
    const testMonster = getMonsterAt(avatarX, avatarY) || { x: avatarX, y: avatarY, type: "妖兽", level: 2, hp: 72, maxHp: 72, atk: 14, def: 5 };
    startBattleWith(testMonster);
    isAutoMode = true;
    addLog("测试：已触发即时战斗");
    renderAll();

    addLog(ok ? "手动存档成功" : "手动存档失败");
});

loadBtn.addEventListener("click", () => {
    const ok = loadFromLocal();
    addLog(ok ? "读取存档成功" : "读取存档失败");
    if (ok) renderAll();
});

itemMenuEl.addEventListener("click", (e) => {
    e.stopPropagation();
    const btn = e.target.closest("button[data-item-action]");
    if (!btn || !itemMenuState) return;
    const { itemId, source } = itemMenuState;
    let ok = false;
    if (btn.dataset.itemAction === "use") ok = useItemFrom(source, itemId);
    if (btn.dataset.itemAction === "equip") ok = equipItemFrom(source, itemId);
    if (btn.dataset.itemAction === "recycle") ok = recycleItemFrom(source, itemId);
    closeItemMenu();
    if (ok) renderAll();
});

document.addEventListener("click", () => {
    closeItemMenu();
});

window.addEventListener("resize", () => {
    closeItemMenu();
});

rightTabButtonsEl.querySelectorAll("button[data-right-tab]").forEach((btn) => {

    });
});

codexBtn.addEventListener("click", () => {
    codexPanelEl.classList.remove("hidden");
});

codexCloseBtn.addEventListener("click", () => {
    codexPanelEl.classList.add("hidden");
    itemDetailEl.classList.add("hidden");
});

grid.addEventListener("mousemove", (e) => {
    const cell = e.target.closest(".cell");
    if (!cell) {
        tooltip.style.display = "none";
        return;
    }

    const wx = Number(cell.dataset.wx);
    const wy = Number(cell.dataset.wy);
    const span = Number(cell.dataset.span);
    inspectText = formatChunkTooltip(wx, wy, span);
    tooltip.textContent = inspectText;
    tooltip.style.display = "block";
    tooltip.style.left = `${e.clientX + 16}px`;
    tooltip.style.top = `${e.clientY + 16}px`;
    updateSidePanels();
});

grid.addEventListener("mouseleave", () => {
    tooltip.style.display = "none";
    inspectText = "";
    updateSidePanels();
});

grid.addEventListener("click", (e) => {
    const cell = e.target.closest(".cell");
    if (!cell) return;
    const wx = Number(cell.dataset.wx);
    const wy = Number(cell.dataset.wy);
    const span = Number(cell.dataset.span);
    if (span !== 1) {
        if (isHomeBuildTile(wx, wy)) {
            zoomLevel = 1;
            openBuildPanel(wx, wy);
            renderAll();
        } else {
            closeBuildPanel();
        }
        return;
    }
    if (!isHomeBuildTile(wx, wy)) {
        closeBuildPanel();
        return;
    }
    openBuildPanel(wx, wy);
    renderAll();
});

document.addEventListener("wheel", (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 1 : -1;
    const nextLevel = Math.max(0, Math.min(ZOOM_LEVELS.length - 1, zoomLevel + delta));
    if (nextLevel !== zoomLevel) {
        zoomLevel = nextLevel;
        renderAll();
    }
}, { passive: false });

window.render_game_to_text = renderGameToText;
window.advanceTime = advanceTime;
window.getReservationSnapshot = () => reservationBackend.exportSnapshot();
window.applyReservationSnapshot = (snapshot, options = {}) => reservationBackend.importSnapshot(snapshot, options);
window.saveGame = () => saveToLocal();
window.loadGame = () => loadFromLocal();

setInterval(() => updateSimulation(100), 100);
setInterval(() => saveToLocal(), 15000);

avatarHp = getAvatarMaxHp();
avatarMp = getAvatarMaxMp();
if (loadFromLocal()) {
    addLog("已自动读取本地存档");
}
pillThresholdInput.value = String(Math.round(autoUsePillRatio * 100));
salveThresholdInput.value = String(Math.round(autoUseSalveRatio * 100));
pillThresholdLabel.textContent = String(Math.round(autoUsePillRatio * 100));
salveThresholdLabel.textContent = String(Math.round(autoUseSalveRatio * 100));
renderAll();
addLog("系统就绪：自动探索、妖物遭遇战、返城整备与多级缩放已启用");
</script>
