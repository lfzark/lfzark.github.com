<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG 3D 基地保卫战 - 特效增强</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        .control-hint {
            background: rgba(0, 0, 0, 0.8);
            border-left: 4px solid #c4a169;
            padding: 12px;
            color: #eee;
            margin-bottom: 8px;
            backdrop-filter: blur(5px);
        }
        #game-over {
            position: absolute;
            inset: 0;
            background: rgba(13, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            color: #ff4444;
        }
    </style>
</head>
<body>

<div id="game-over">
    <h1 class="text-6xl font-black italic tracking-tighter mb-4">基地被摧毁</h1>
    <button onclick="location.reload()" class="px-8 py-3 bg-red-600 text-white font-bold uppercase hover:bg-red-500 transition-colors">重新召唤</button>
</div>

<div id="ui-overlay">
    <div class="control-hint">
        <h2 class="text-xl font-bold text-yellow-500 mb-1 tracking-wider uppercase">基地保卫战: 战斗增强</h2>
        <p class="text-xs text-gray-400">体验斩击、震屏与受击粒子特效</p>
    </div>
    <div id="base-status" class="control-hint">
        <p class="text-sm">基地生命: <span id="base-hp-text" class="font-bold text-green-400">1000</span></p>
        <div class="w-full h-2 bg-gray-900 mt-1">
            <div id="base-hp-bar" class="h-full bg-green-500 transition-all duration-300" style="width: 100%"></div>
        </div>
    </div>
</div>

<script>
    let scene, camera, renderer, clock, mixer;
    let hero, base, heroAnimations = {};
    let targetPosition = new THREE.Vector3(0, 0, 0);
    let isMoving = false;
    let ground;
    
    let zoomDistance = 18;
    let enemies = [];
    let isGameOver = false;

    // 特效容器
    let particles = [];
    let vfxObjects = [];
    let cameraShake = 0;

    const ENEMY_COUNT = 6;
    const HERO_ATTACK_RANGE = 4;
    const ENEMY_ATTACK_RANGE = 3;

    const MODEL_URL = 'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb';

    const healthBarMat = new THREE.SpriteMaterial({ color: 0x00ff00 });
    const healthBgMat = new THREE.SpriteMaterial({ color: 0x220000 });

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020508);
        scene.fog = new THREE.FogExp2(0x020508, 0.02);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, zoomDistance);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(15, 30, 15);
        dirLight.castShadow = true;
        scene.add(dirLight);

        createGround();
        createBase();
        loadHeroModel();
        
        setInterval(() => {
            if(!isGameOver && enemies.length < ENEMY_COUNT) createEnemy();
        }, 3000);

        window.addEventListener('resize', onWindowResize);
        window.addEventListener('mousedown', onMouseDown);
        window.addEventListener('wheel', (e) => {
            zoomDistance = THREE.MathUtils.clamp(zoomDistance + e.deltaY * 0.02, 8, 50);
        });
        window.addEventListener('contextmenu', (e) => e.preventDefault());

        animate();
    }

    function createGround() {
        const groundGeo = new THREE.PlaneGeometry(400, 400);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);
        scene.add(new THREE.GridHelper(400, 80, 0x333333, 0x111111));
    }

    function createBase() {
        base = new THREE.Group();
        const baseGeo = new THREE.CylinderGeometry(3, 3.5, 1, 6);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, metalness: 0.8 });
        const mesh = new THREE.Mesh(baseGeo, baseMat);
        mesh.castShadow = true;
        base.add(mesh);

        const crystalGeo = new THREE.OctahedronGeometry(2, 0);
        const crystalMat = new THREE.MeshPhongMaterial({ 
            color: 0x00ccff, 
            emissive: 0x0044ff, 
            shininess: 100,
            transparent: true,
            opacity: 0.8
        });
        const crystal = new THREE.Mesh(crystalGeo, crystalMat);
        crystal.position.y = 3;
        crystal.name = "crystal";
        base.add(crystal);

        base.position.set(0, 0, 0);
        base.userData = { hp: 1000, maxHp: 1000 };
        scene.add(base);

        const ringGeo = new THREE.RingGeometry(4, 4.5, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = 0.1;
        base.add(ring);
    }

    function createEnemy() {
        const group = new THREE.Group();
        const body = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0xff3300 })
        );
        body.position.y = 0.8;
        body.castShadow = true;
        group.add(body);

        const bg = new THREE.Sprite(healthBgMat);
        bg.scale.set(1.5, 0.15, 1);
        bg.position.y = 2.5;
        group.add(bg);

        const bar = new THREE.Sprite(healthBarMat.clone());
        bar.scale.set(1.5, 0.15, 1);
        bar.position.y = 2.5;
        bar.name = "hpBar";
        group.add(bar);

        const angle = Math.random() * Math.PI * 2;
        const radius = 50;
        group.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);

        group.userData = { 
            hp: 100, 
            maxHp: 100, 
            state: 'MOVE_TO_BASE',
            lastAttack: 0 
        };

        enemies.push(group);
        scene.add(group);
    }

    // --- 特效系统 ---

    function createHitParticles(pos, color = 0xffaa00) {
        for(let i=0; i<8; i++) {
            const pGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const pMat = new THREE.MeshBasicMaterial({ color: color });
            const p = new THREE.Mesh(pGeo, pMat);
            p.position.copy(pos);
            p.position.y += 1;
            
            const velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 0.2,
                Math.random() * 0.2,
                (Math.random() - 0.5) * 0.2
            );
            
            particles.push({ mesh: p, vel: velocity, life: 1.0 });
            scene.add(p);
        }
    }

    function createSlashVFX(pos, rotationY) {
        const slashGeo = new THREE.TorusGeometry(2, 0.05, 2, 10, Math.PI / 2);
        const slashMat = new THREE.MeshBasicMaterial({ 
            color: 0x00ffff, 
            transparent: true, 
            opacity: 0.8,
            side: THREE.DoubleSide
        });
        const slash = new THREE.Mesh(slashGeo, slashMat);
        slash.position.copy(pos);
        slash.position.y = 1.5;
        slash.rotation.set(Math.PI/2, 0, rotationY - Math.PI/4);
        
        vfxObjects.push({ mesh: slash, life: 1.0, type: 'slash' });
        scene.add(slash);
    }

    function loadHeroModel() {
        const loader = new THREE.GLTFLoader();
        loader.load(MODEL_URL, (gltf) => {
            hero = gltf.scene;
            hero.scale.set(0.4, 0.4, 0.4);
            scene.add(hero);

            mixer = new THREE.AnimationMixer(hero);
            gltf.animations.forEach(clip => heroAnimations[clip.name] = mixer.clipAction(clip));
            heroAnimations['Idle'].play();
        });
    }

    function onMouseDown(event) {
        if (event.button !== 2 || !hero) return;
        const mouse = new THREE.Vector2((event.clientX / window.innerWidth) * 2 - 1, -(event.clientY / window.innerHeight) * 2 + 1);
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(ground);
        if (intersects.length > 0) {
            targetPosition.copy(intersects[0].point);
            isMoving = true;
            if (activeActionName !== 'Punch') fadeToAction('Running');
        }
    }

    let activeActionName = 'Idle';
    function fadeToAction(name) {
        if (name === activeActionName || !heroAnimations[name]) return;
        heroAnimations[name].reset().fadeIn(0.1).play();
        if (heroAnimations[activeActionName]) heroAnimations[activeActionName].fadeOut(0.1);
        activeActionName = name;
    }

    function updateEnemies(delta) {
        const now = Date.now();
        enemies.forEach((enemy, index) => {
            const distToBase = enemy.position.distanceTo(base.position);
            const distToHero = hero ? enemy.position.distanceTo(hero.position) : 999;

            if (distToHero < 6) {
                enemy.userData.state = distToHero < ENEMY_ATTACK_RANGE ? 'ATTACK_HERO' : 'MOVE_TO_HERO';
            } else {
                enemy.userData.state = distToBase < ENEMY_ATTACK_RANGE + 2 ? 'ATTACK_BASE' : 'MOVE_TO_BASE';
            }

            let target;
            if (enemy.userData.state.includes('HERO')) target = hero.position;
            else target = base.position;

            const dir = new THREE.Vector3().subVectors(target, enemy.position).normalize();
            
            if (enemy.userData.state.startsWith('MOVE')) {
                enemy.position.addScaledVector(dir, 0.05);
                enemy.lookAt(target.x, 0, target.z);
            } else {
                if (now - enemy.userData.lastAttack > 1500) {
                    if (enemy.userData.state === 'ATTACK_BASE') {
                        damageBase(10);
                        createHitParticles(base.position, 0x00ccff); // 基地受击特效
                    }
                    enemy.userData.lastAttack = now;
                    enemy.scale.set(1.3, 1.3, 1.3);
                    setTimeout(() => enemy.scale.set(1, 1, 1), 200);
                }
            }
        });
    }

    function damageBase(amount) {
        if (isGameOver) return;
        base.userData.hp -= amount;
        cameraShake = 0.3; // 基地受击抖动
        const percent = Math.max(0, (base.userData.hp / base.userData.maxHp) * 100);
        document.getElementById('base-hp-bar').style.width = percent + '%';
        document.getElementById('base-hp-text').innerText = Math.ceil(base.userData.hp);
        
        base.getObjectByName("crystal").material.emissive.setHex(0xff0000);
        setTimeout(() => base.getObjectByName("crystal")?.material.emissive.setHex(0x0044ff), 100);

        if (base.userData.hp <= 0) {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'flex';
        }
    }

    let lastHitTime = 0;
    function handleHeroCombat() {
        if (!hero || isGameOver) return;
        
        let nearest = null;
        let minDist = HERO_ATTACK_RANGE;

        enemies.forEach(e => {
            const d = hero.position.distanceTo(e.position);
            if (d < minDist) { minDist = d; nearest = e; }
        });

        if (nearest) {
            isMoving = false;
            if (activeActionName !== 'Punch') {
                fadeToAction('Punch');
                // 产生斩击光效
                createSlashVFX(hero.position, hero.rotation.y);
            }
            hero.lookAt(nearest.position.x, 0, nearest.position.z);

            if (activeActionName === 'Punch') {
                // 每隔一小段时间判定一次伤害，匹配动画节奏
                const now = Date.now();
                if(now - lastHitTime > 100) {
                    nearest.userData.hp -= 2;
                    lastHitTime = now;
                    
                    // 受击反馈：变红 + 粒子
                    nearest.children[0].material.emissive.setHex(0xffffff);
                    setTimeout(() => nearest.children[0].material.emissive.setHex(0x000000), 50);
                    
                    if(Math.random() > 0.7) {
                        createHitParticles(nearest.position, 0xff3300);
                        cameraShake = 0.15; // 命中抖动
                    }

                    const hpBar = nearest.getObjectByName("hpBar");
                    hpBar.scale.x = Math.max(0, (nearest.userData.hp / nearest.userData.maxHp) * 1.5);
                    
                    if (nearest.userData.hp <= 0) {
                        createHitParticles(nearest.position, 0xffaa00); // 死亡大爆炸粒子
                        scene.remove(nearest);
                        enemies = enemies.filter(e => e !== nearest);
                        fadeToAction('Idle');
                    }
                }
            }
        } else if (activeActionName === 'Punch') {
            fadeToAction('Idle');
        }
    }

    function updateVFX(delta) {
        // 更新粒子
        for(let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.mesh.position.add(p.vel);
            p.vel.y -= 0.01; // 重力
            p.life -= delta * 2;
            p.mesh.scale.setScalar(p.life);
            if(p.life <= 0) {
                scene.remove(p.mesh);
                particles.splice(i, 1);
            }
        }

        // 更新斩击光效
        for(let i = vfxObjects.length - 1; i >= 0; i--) {
            const v = vfxObjects[i];
            v.life -= delta * 5;
            v.mesh.scale.addScalar(0.1);
            v.mesh.material.opacity = v.life;
            if(v.life <= 0) {
                scene.remove(v.mesh);
                vfxObjects.splice(i, 1);
            }
        }

        // 更新震屏
        if(cameraShake > 0) {
            camera.position.x += (Math.random() - 0.5) * cameraShake;
            camera.position.y += (Math.random() - 0.5) * cameraShake;
            cameraShake *= 0.9; // 衰减
        }
    }

    function animate() {
        if (isGameOver) return;
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (mixer) mixer.update(delta);

        const crystal = base.getObjectByName("crystal");
        if(crystal) {
            crystal.rotation.y += 0.02;
            crystal.position.y = 3 + Math.sin(Date.now() * 0.002) * 0.5;
        }

        updateEnemies(delta);
        handleHeroCombat();
        updateVFX(delta);

        if (hero && isMoving && activeActionName !== 'Punch') {
            const moveDir = new THREE.Vector3().subVectors(targetPosition, hero.position);
            if (moveDir.length() > 0.2) {
                moveDir.normalize();
                hero.rotation.y = THREE.MathUtils.lerp(hero.rotation.y, Math.atan2(moveDir.x, moveDir.z), 0.1);
                hero.position.addScaledVector(moveDir, 0.18);
            } else {
                isMoving = false;
                fadeToAction('Idle');
            }
        }

        if (hero) {
            const camPos = hero.position.clone().add(new THREE.Vector3(0, zoomDistance * 0.7, zoomDistance * 0.8));
            camera.position.lerp(camPos, 0.05);
            camera.lookAt(hero.position.x, 0, hero.position.z);
        }

        renderer.render(scene, camera);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
</script>

</body>
</html>
