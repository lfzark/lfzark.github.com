function monsterLevelAt(x, y) {
    const dist = Math.abs(x - HOME_X) + Math.abs(y - HOME_Y);
    if (dist <= 5) return 1;
    if (dist <= 9) return 2;
    if (dist <= 13) return 3;
    if (dist <= 18) return 4;
    return 5;
}

function getMonsterDropProfile(type) {
    return MONSTER_CODEX.find((m) => m.type === type) || null;
}

function getMonsterAvatar(type) {
    if (type === "天劫妖王") return "🐲";
    if (type === "精英妖将") return "🦔";
    if (type === "妖将") return "🦂";
    if (type === "妖兽") return "🦇";
    return "🐭";
}

function getMonsterAttackCdMs(type, level = 1) {
    const byType = type === "天劫妖王" ? 5000
        : type === "精英妖将" ? 4400
            : type === "妖将" ? 3800
                : type === "妖兽" ? 3300
                    : 2800;
    const levelAdj = Math.max(0, Math.min(600, (level - 1) * 60));
    return Math.max(2200, Math.min(5000, byType - levelAdj));
}

function getMonsterSeed(x, y) {
    const h = simpleHash(x * 17 + 13, y * 19 + 29);
    const terrain = getTerrainClass(x, y);
    if (!isPassable(x, y)) return null;
    if (isHomeBuildTile(x, y)) return null;
    if (devForceMonster) {
        const level = Math.max(1, monsterLevelAt(x, y));
        const type = level >= 8 ? "天劫妖王" : level >= 6 ? "精英妖将" : level >= 4 ? "妖将" : level >= 2 ? "妖兽" : "邪祟";
        const devMul = type === "天劫妖王" ? 3.1 : type === "精英妖将" ? 2.1 : 1;
        return {
            type,
            level,
            maxHp: Math.floor((34 + level * 24) * BALANCE_CONFIG.combat.monsterHpScale * devMul),
            atk: Math.floor((8 + level * 3 + (level >= 6 ? 7 : 0)) * (type === "天劫妖王" ? 2.2 : type === "精英妖将" ? 1.55 : 1)),
            def: Math.floor((2 + level * 2 + (level >= 6 ? 4 : 0)) * (type === "天劫妖王" ? 2.0 : type === "精英妖将" ? 1.5 : 1))
        };
    }
    const baitBoost = simulationTimeMs < baitBoostUntilMs ? 0.2 : 0;
    const spawnBase = (terrain === "mountain" ? 0.34 : terrain === "forest" ? 0.28 : terrain === "hill" ? 0.22 : 0.12) + baitBoost + (getWorldEventEffects().monsterSpawnAdd || 0);
    const spawnRoll = (h % 1000) / 1000;
    if (spawnRoll > spawnBase) return null;
    const level = monsterLevelAt(x, y);
    const homeDist = Math.abs(x - HOME_X) + Math.abs(y - HOME_Y);
    const rareRoll = ((h >> 10) % 1000) / 1000;
    let type = rareRoll < 0.08 ? "妖将" : rareRoll < 0.28 ? "妖兽" : "邪祟";
    if (level >= 4 && rareRoll < 0.05) type = "精英妖将";
    if (level >= 4 && rareRoll < 0.01) type = "天劫妖王";
    if (type === "天劫妖王" && homeDist > BOSS_SPAWN_MAX_HOME_DISTANCE) {
        type = "精英妖将";
    }
    const eliteMul = type === "精英妖将" ? 2.0 : type === "天劫妖王" ? 3.0 : 1;
    const maxHp = Math.floor((32 + level * 22 + (h % 9)) * BALANCE_CONFIG.combat.monsterHpScale * eliteMul);
    const atk = Math.floor((8 + level * 3 + (h % 4)) * (type === "天劫妖王" ? 2.4 : type === "精英妖将" ? 1.75 : 1));
    const def = Math.floor((2 + level * 2) * (type === "天劫妖王" ? 2.3 : type === "精英妖将" ? 1.7 : 1));
    return { type, level, maxHp, atk, def };
}

function getMonsterAt(x, y) {
    const key = tileKey(x, y);
    const seed = getMonsterSeed(x, y);
    if (!seed) return null;
    const entry = monsterStateMap.get(key);
    if (!entry) {
        const created = { alive: true, hp: seed.maxHp, respawnAt: 0 };
        monsterStateMap.set(key, created);
        return { ...seed, x, y, hp: created.hp, alive: true };
    }
    if (!entry.alive) {
        if (simulationTimeMs >= entry.respawnAt) {
            entry.alive = true;
            entry.hp = seed.maxHp;
        } else {
            return null;
        }
    }
    return { ...seed, x, y, hp: entry.hp, alive: true };
}

function setMonsterHp(x, y, hp, maxHp) {
    const key = tileKey(x, y);
    const entry = monsterStateMap.get(key) || { alive: true, hp: maxHp, respawnAt: 0 };
    entry.hp = Math.max(0, hp);
    if (entry.hp <= 0) {
        entry.alive = false;
        entry.respawnAt = simulationTimeMs + BALANCE_CONFIG.timing.monsterRespawnMs;
    } else {
        entry.alive = true;
    }
    monsterStateMap.set(key, entry);
}

function startBattleWith(monster) {
    if (!monster) return false;
    isGathering = false;
    gatherRemainingMs = 0;
    gatherTotalMs = 0;
    gatheringProgress = 0;
    gatheringTarget = null;
    battleState = {
        x: monster.x,
        y: monster.y,
        type: monster.type,
        level: monster.level,
        hp: monster.hp,
        maxHp: monster.maxHp,
        atk: monster.atk,
        def: monster.def,
        rounds: 0,
        playerCdMs: 0,
        enemyCdMs: 0,
        playerAttackCdMs: 5000,
        enemyAttackCdMs: getMonsterAttackCdMs(monster.type, monster.level)
    };
    battleSummaryData = null;
    battleUiEnemyHpDisplay = monster.hp;
    battleUiSelfHpDisplay = avatarHp;
    battleMetrics = { dealt: 0, taken: 0, crits: 0, heals: 0, startMs: simulationTimeMs };
    lastDamageSnapshot = { selfLoss: 0, enemyLoss: 0 };
    lastBattleFrame = null;
    movementStatusText = `遭遇 ${monster.type} Lv.${monster.level}，进入战斗`;
    return true;
}

function grantBattleLoot(monster) {
    const riskBonus = getRiskRewardBonusAt(monster.x, monster.y);
    const eventDropMul = 1 + (getWorldEventEffects().dropMul || 0);
    const rewardBoost = 1.6;
    const tierMul = monster.type === "天劫妖王" ? 3.2 : monster.type === "精英妖将" ? 2.2 : monster.type === "妖将" ? 1.5 : 1;
    const gainStone = Math.floor((8 + monster.level * 4) * (1 + riskBonus * 0.9) * tierMul * eventDropMul * rewardBoost);
    const gainHerb = monster.level >= 2 ? Math.max(1, Math.floor((riskBonus >= 0.35 ? 2 : 1) * tierMul * rewardBoost)) : 0;
    const eq = getEquipmentBonus();
    const rareChance = Math.min(BALANCE_CONFIG.drops.rareMax, BALANCE_CONFIG.drops.rareBase + sharedStats.fortune + Math.floor(eq.luck * 0.8));
    const coreBase = monster.type === "妖将" ? 22 : monster.type === "妖兽" ? 14 : 8;
    const coreChance = Math.min(55, coreBase + Math.floor(sharedStats.fortune * 0.6));
    const gainRare = monster.level >= 3 && (devFixedDrops || (simpleHash(monster.x + dayCount, monster.y + dayCombatWins) % 100 < (rareChance + Math.floor(riskBonus * 18) + (monster.type === "天劫妖王" ? 22 : monster.type === "精英妖将" ? 12 : 0)))) ? Math.max(1, Math.floor((tierMul / 1.5) * eventDropMul * rewardBoost)) : 0;
    const gainCore = devFixedDrops ? Math.max(1, Math.floor(tierMul * eventDropMul * rewardBoost)) : (simpleHash(monster.x + dayCount * 3, monster.y + dayCombatWins * 11) % 100 < coreChance ? Math.max(1, Math.floor(tierMul * eventDropMul * rewardBoost)) : 0);
    const chestSmallChance = Math.min(95, BALANCE_CONFIG.drops.chestSmallBase + Math.floor(riskBonus * 42) + monster.level * 7);
    const chestMediumChance = Math.min(75, BALANCE_CONFIG.drops.chestMediumBase + Math.floor(riskBonus * 36) + (monster.level >= 2 ? 14 : 0));
    const chestLargeChance = Math.min(55, BALANCE_CONFIG.drops.chestLargeBase + Math.floor(riskBonus * 20) + (monster.type === "妖将" ? 14 : monster.type === "精英妖将" ? 24 : monster.type === "天劫妖王" ? 40 : 0));
    const gainSmallChest = devFixedDrops || (simpleHash(monster.x + 41, monster.y + dayCombatWins * 7) % 100 < chestSmallChance) ? 1 : 0;
    const gainMediumChest = devFixedDrops || (simpleHash(monster.x + 71, monster.y + dayCombatWins * 13) % 100 < chestMediumChance) ? 1 : 0;
    const gainLargeChest = devFixedDrops || (simpleHash(monster.x + 97, monster.y + dayCombatWins * 19) % 100 < chestLargeChance) ? 1 : 0;
    const dropWeaponRoll = simpleHash(monster.x + dayCount * 37, monster.y + dayCombatWins * 31) % 1000;
    let gainThunderBlade = 0;
    let gainPhoenixBow = 0;
    let gainVoidArmor = 0;
    let gainDragonRelic = 0;
    if (monster.type === "精英妖将" || monster.type === "天劫妖王") {
        if (dropWeaponRoll < 90) gainThunderBlade = 1;
        else if (dropWeaponRoll < 170) gainPhoenixBow = 1;
        else if (dropWeaponRoll < 250) gainVoidArmor = 1;
    }
    if (monster.type === "天劫妖王" && (devFixedDrops || (simpleHash(monster.x + 211, monster.y + dayCombatWins * 53) % 100 < 20))) {
        gainDragonRelic = 1;
    }
    avatarInventory.spiritStone += gainStone;
    avatarInventory.herb += gainHerb;
    avatarInventory.rareCrystal += gainRare;
    avatarInventory.demonCore += gainCore;
    avatarInventory.chestSmall += gainSmallChest;
    avatarInventory.chestMedium += gainMediumChest;
    avatarInventory.chestLarge += gainLargeChest;
    avatarInventory.thunderBlade += gainThunderBlade;
    avatarInventory.phoenixBow += gainPhoenixBow;
    avatarInventory.voidArmor += gainVoidArmor;
    avatarInventory.dragonRelic += gainDragonRelic;
    discoveredItemSet.add("demonCore");
    if (gainRare > 0) discoveredItemSet.add("rareCrystal");
    if (gainSmallChest > 0) discoveredItemSet.add("chestSmall");
    if (gainMediumChest > 0) discoveredItemSet.add("chestMedium");
    if (gainLargeChest > 0) discoveredItemSet.add("chestLarge");
    if (gainThunderBlade > 0) discoveredItemSet.add("thunderBlade");
    if (gainPhoenixBow > 0) discoveredItemSet.add("phoenixBow");
    if (gainVoidArmor > 0) discoveredItemSet.add("voidArmor");
    if (gainDragonRelic > 0) discoveredItemSet.add("dragonRelic");
    dayCombatWins += 1;
    const lootText = `灵石×${gainStone}${gainHerb ? ` / 灵草×${gainHerb}` : ""}${gainCore ? ` / 妖丹×${gainCore}` : ""}${gainRare ? ` / 异晶×${gainRare}` : ""}${gainSmallChest ? ` / 小宝箱×${gainSmallChest}` : ""}${gainMediumChest ? ` / 中宝箱×${gainMediumChest}` : ""}${gainLargeChest ? ` / 大宝箱×${gainLargeChest}` : ""}${gainThunderBlade ? " / 雷劫断岳×1" : ""}${gainPhoenixBow ? " / 赤凰长弓×1" : ""}${gainVoidArmor ? " / 太虚战铠×1" : ""}${gainDragonRelic ? " / 天龙遗宝×1" : ""}`;
    addLog(`战斗胜利：${monster.type}，掉落 ${lootText}`);
    return lootText;
}

function resolveBattleStep(elapsedMs = 100) {
    if (!battleState) return;
    if (avatarHp <= 0) return;
    const tactic = currentBattleTactic();
    const debuffActive = simulationTimeMs < injuryDebuffUntilMs;
    const meBase = getAvatarCombatPower();
    const debuffMul = debuffActive ? BALANCE_CONFIG.combat.injuryDebuffRatio : 1;
    const me = {
        atk: Math.max(1, Math.floor(meBase.atk * tactic.atkMul * debuffMul)),
        def: Math.max(1, Math.floor(meBase.def * tactic.defMul * debuffMul)),
        hit: Math.min(0.98, Math.max(0.55, meBase.hit + tactic.hitBonus - (debuffActive ? 0.03 : 0))),
        dodge: Math.min(0.55, Math.max(0.03, meBase.dodge + tactic.dodgeBonus - (debuffActive ? 0.02 : 0)))
    };
    battleState.playerCdMs = Math.max(0, (battleState.playerCdMs || 0) - elapsedMs);
    battleState.enemyCdMs = Math.max(0, (battleState.enemyCdMs || 0) - elapsedMs);
    const eventLines = [];
    let detailMeta = "";
    let lastEnemyLoss = 0;
    let lastSelfLoss = 0;
    let lastCrit = false;
    const itemEvents = [];

    if (battleState.playerCdMs <= 0 && battleState.hp > 0) {
        battleState.rounds += 1;
        const seed = battleState.rounds * 11 + 1;
        const rollHit = (simpleHash(battleState.x + seed, battleState.y + dayCount * 17) % 1000) / 1000;
        const avatarHit = rollHit <= me.hit;
        const avatarDmgBase = avatarHit ? Math.max(1, me.atk - battleState.def + (battleState.rounds % 3)) : 0;
        const critRoll = (simpleHash(battleState.x + seed * 5, battleState.y + dayCount * 5) % 1000) / 1000;
        const didCrit = avatarHit && critRoll < (0.1 + tactic.critBonus);
        const avatarScaled = Math.max(0, Math.floor(avatarDmgBase * BALANCE_CONFIG.combat.playerDamageScale));
        const finalAvatarDmg = didCrit ? Math.max(1, Math.floor(avatarScaled * 1.6)) : avatarScaled;
        const hpBeforeEnemy = battleState.hp;
        battleState.hp = Math.max(0, battleState.hp - finalAvatarDmg);
        lastEnemyLoss = Math.max(0, hpBeforeEnemy - battleState.hp);
        lastCrit = didCrit && lastEnemyLoss > 0;
        if (battleMetrics) {
            battleMetrics.dealt += Math.max(0, hpBeforeEnemy - battleState.hp);
            if (didCrit) battleMetrics.crits += 1;
        }
        if (didCrit) {
            spawnCombatFx(`暴击 ${finalAvatarDmg}`, "crit", -6);
            triggerBattleImpactFx("crit");
        } else if (avatarHit) {
            spawnCombatFx(`-${finalAvatarDmg}`, "damage", -6);
            triggerBattleImpactFx("hit");
        } else {
            spawnCombatFx("未命中", "info", -6);
        }
        eventLines.push(avatarHit ? `我方 → 敌方 -${finalAvatarDmg}HP${didCrit ? "（暴击）" : ""}` : "我方 → 敌方 未命中");
        detailMeta += `我方命中检定 ${rollHit.toFixed(3)}；`;
        battleState.playerCdMs = battleState.playerAttackCdMs || 5000;
    }

    if (battleState.hp > 0 && battleState.enemyCdMs <= 0) {
        const seed = battleState.rounds * 13 + 2;
        const rollDodge = (simpleHash(battleState.x + seed * 3, battleState.y + dayCount * 23) % 1000) / 1000;
        const monsterHit = rollDodge > me.dodge;
        const rawMonsterDmg = Math.floor(battleState.atk * 0.58) - Math.floor(me.def * 0.28);
        const bossMul = battleState.type === "天劫妖王" ? 1.35 : battleState.type === "精英妖将" ? 1.18 : 1;
        const monsterDmgBase = monsterHit ? Math.max(2, Math.floor(rawMonsterDmg * bossMul)) : 0;
        const monsterScaled = Math.max(0, Math.floor(monsterDmgBase * BALANCE_CONFIG.combat.monsterDamageScale * tactic.incomingMul * (1 + (getWorldEventEffects().monsterDamageMul || 0))));
        const hpBeforeSelf = avatarHp;
        avatarHp = Math.max(0, avatarHp - monsterScaled);
        lastSelfLoss = Math.max(0, hpBeforeSelf - avatarHp);
        if (battleMetrics) {
            battleMetrics.taken += Math.max(0, hpBeforeSelf - avatarHp);
        }
        if (monsterHit) spawnCombatFx(`受击 -${monsterScaled}`, "damage", 6);
        else spawnCombatFx("敌方未命中", "info", 6);
        eventLines.push(monsterHit ? `敌方 → 我方 -${monsterScaled}HP` : "敌方 → 我方 未命中");
        detailMeta += `敌方命中检定 ${rollDodge.toFixed(3)}；`;
        battleState.enemyCdMs = battleState.enemyAttackCdMs || 5000;
    }

    lastBattleFrame = {
        round: battleState.rounds,
        tactic: tactic.label,
        actor: "CD",
        avatarHit: eventLines.some((line) => line.includes("我方 → 敌方 -")),
        monsterHit: eventLines.some((line) => line.includes("敌方 → 我方 -")),
        crit: eventLines.some((line) => line.includes("暴击")),
        avatarDmg: lastEnemyLoss,
        monsterDmg: lastSelfLoss,
        hitRoll: 0,
        dodgeRoll: 0,
        hpBefore: {},
        hpAfter: { enemy: battleState.hp, self: avatarHp },
        eventText: eventLines.join(" ｜ "),
        detailText: detailMeta,
        itemText: ""
    };
    movementStatusText = `战斗中 ${battleState.type} HP ${battleState.hp}/${battleState.maxHp}，化身HP ${avatarHp}/${getAvatarMaxHp()}｜CD 我方${Math.ceil(battleState.playerCdMs / 1000)}s 敌方${Math.ceil(battleState.enemyCdMs / 1000)}s`;
    if (battleState.hp <= 0) {
        battleState.hp = 0;
        battleUiEnemyHpDisplay = 0;
        triggerEnemyKillBarClearFx();
        setMonsterHp(battleState.x, battleState.y, 0, battleState.maxHp);
        const lootText = grantBattleLoot(battleState);
        battleSummaryData = {
            atMs: simulationTimeMs,
            result: "胜利",
            enemy: `${battleState.type} Lv.${battleState.level}`,
            enemyMaxHp: battleState.maxHp,
            enemyHpEnd: 0,
            rounds: battleState.rounds,
            durationSec: battleMetrics ? Math.max(1, Math.round((simulationTimeMs - battleMetrics.startMs) / 1000)) : battleState.rounds,
            dealt: battleMetrics ? battleMetrics.dealt : Math.max(0, battleState.maxHp),
            taken: battleMetrics ? battleMetrics.taken : Math.max(0, getAvatarMaxHp() - avatarHp),
            crits: battleMetrics ? battleMetrics.crits : 0,
            healed: battleMetrics ? battleMetrics.heals : 0,
            loot: lootText
        };
        battleMetrics = null;
        battleState = null;
        if (shouldReturnHome()) autoObjective = "return_home";
        return;
    }
    if (avatarHp <= Math.floor(getAvatarMaxHp() * autoUsePillRatio) && (avatarInventory.spiritPill || 0) > 0) {
        avatarInventory.spiritPill -= 1;
        const heal = Math.floor(getAvatarMaxHp() * 0.32);
        avatarHp = Math.min(getAvatarMaxHp(), avatarHp + heal);
        if (battleMetrics) battleMetrics.heals += heal;
        spawnCombatFx(`+${heal}`, "heal", 12);
        itemEvents.push(`聚灵丹 +${heal}HP`);
    } else if (avatarHp <= Math.floor(getAvatarMaxHp() * autoUsePillRatio) && (avatarInventory.bloodPill || 0) > 0) {
        avatarInventory.bloodPill -= 1;
        const heal = Math.floor(getAvatarMaxHp() * 0.42);
        avatarHp = Math.min(getAvatarMaxHp(), avatarHp + heal);
        if (battleMetrics) battleMetrics.heals += heal;
        spawnCombatFx(`+${heal}`, "heal", 12);
        itemEvents.push(`回血丹 +${heal}HP`);
    }
    if (avatarHp <= Math.floor(getAvatarMaxHp() * autoUseSalveRatio) && (avatarInventory.healingSalve || 0) > 0) {
        avatarInventory.healingSalve -= 1;
        const heal = Math.floor(getAvatarMaxHp() * 0.22);
        avatarHp = Math.min(getAvatarMaxHp(), avatarHp + heal);
        if (battleMetrics) battleMetrics.heals += heal;
        spawnCombatFx(`+${heal}`, "heal", 16);
        itemEvents.push(`回春散 +${heal}HP`);
    }
    if (lastBattleFrame) {
        lastBattleFrame.itemText = itemEvents.join("；");
        lastBattleFrame.crit = lastCrit;
        if ((lastBattleFrame.monsterDmg || 0) > 0 || (lastBattleFrame.avatarDmg || 0) > 0) {
            lastDamageSnapshot = {
                selfLoss: lastBattleFrame.monsterDmg || 0,
                enemyLoss: lastBattleFrame.avatarDmg || 0
            };
        }
    }
    if (avatarHp <= 0) {
        const riskBonus = getRiskRewardBonusAt(battleState.x, battleState.y);
        const lossRatio = 0.12 + riskBonus * 0.18;
        const lostStone = Math.floor(avatarInventory.spiritStone * lossRatio);
        const lostCore = Math.floor((avatarInventory.demonCore || 0) * (0.08 + riskBonus * 0.12));
        avatarInventory.spiritStone = Math.max(0, avatarInventory.spiritStone - lostStone);
        avatarInventory.demonCore = Math.max(0, avatarInventory.demonCore - lostCore);
        avatarX = HOME_X;
        avatarY = HOME_Y;
        avatarHp = 0;
        avatarMp = 0;
        avatarReviveUntilMs = simulationTimeMs + AVATAR_REVIVE_COOLDOWN_MS;
        injuryDebuffUntilMs = simulationTimeMs + BALANCE_CONFIG.combat.injuryDurationMs;
        battleSummaryData = {
            atMs: simulationTimeMs,
            result: "战败",
            enemy: `${battleState.type} Lv.${battleState.level}`,
            enemyMaxHp: battleState.maxHp,
            enemyHpEnd: battleState.hp,
            rounds: battleState.rounds,
            durationSec: battleMetrics ? Math.max(1, Math.round((simulationTimeMs - battleMetrics.startMs) / 1000)) : battleState.rounds,
            dealt: battleMetrics ? battleMetrics.dealt : Math.max(0, battleState.maxHp - battleState.hp),
            taken: battleMetrics ? battleMetrics.taken : Math.max(0, getAvatarMaxHp() - avatarHp),
            crits: battleMetrics ? battleMetrics.crits : 0,
            healed: battleMetrics ? battleMetrics.heals : 0,
            loot: `损失灵石 ${lostStone}${lostCore ? ` / 妖丹 ${lostCore}` : ""}`
        };
        battleMetrics = null;
        battleState = null;
        autoObjective = "return_home";
        addLog(`化身陨落退回洞府，损失灵石 ${lostStone}${lostCore ? ` / 妖丹 ${lostCore}` : ""}，10分钟后复活`);
        return;
    }
    if (avatarHp <= Math.floor(getAvatarMaxHp() * BALANCE_CONFIG.combat.lowHpRetreatRatio)) {
        addLog("化身血量偏低，撤离返城");
        battleSummaryData = {
            atMs: simulationTimeMs,
            result: "撤离",
            enemy: `${battleState.type} Lv.${battleState.level}`,
            enemyMaxHp: battleState.maxHp,
            enemyHpEnd: battleState.hp,
            rounds: battleState.rounds,
            durationSec: battleMetrics ? Math.max(1, Math.round((simulationTimeMs - battleMetrics.startMs) / 1000)) : battleState.rounds,
            dealt: battleMetrics ? battleMetrics.dealt : Math.max(0, battleState.maxHp - battleState.hp),
            taken: battleMetrics ? battleMetrics.taken : Math.max(0, getAvatarMaxHp() - avatarHp),
            crits: battleMetrics ? battleMetrics.crits : 0,
            healed: battleMetrics ? battleMetrics.heals : 0,
            loot: "无结算掉落"
        };
        battleMetrics = null;
        autoObjective = "return_home";
        battleState = null;
        return;
    }
}

function getRealmName() {
    const idx = Math.max(0, Math.min(cultivationLevel - 1, REALM_NAMES.length - 1));
    return REALM_NAMES[idx];
}

function getRealmStyleClass(level = cultivationLevel) {
    if (level >= 7) return "realm-style-high";
    if (level >= 4) return "realm-style-mid";
    return "realm-style-low";
}

function getRealmStyledText(level = cultivationLevel) {
    return `<span class="${getRealmStyleClass(level)}">Lv.${level} ${getRealmName()}</span>`;
}

function totalInventoryLoad() {
    return avatarInventory.spiritStone + avatarInventory.herb + avatarInventory.wood + avatarInventory.demonCore * 2 + avatarInventory.rareCrystal * 4 +
        avatarInventory.chestSmall + avatarInventory.chestMedium * 2 + avatarInventory.chestLarge * 3;
}

function distanceToHome() {
    return Math.abs(avatarX - HOME_X) + Math.abs(avatarY - HOME_Y);
}

function isAtHome() {
    return avatarX === HOME_X && avatarY === HOME_Y;
}

function resourceKeyFromSeed(seed) {
    if (seed.mainType === "herb") return "herb";
    if (seed.mainType === "wood") return "wood";
    if (seed.mainType === "rare") return "rareCrystal";
    return "spiritStone";
}

function movementCostAt(x, y) {
    const terrain = getTerrainClass(x, y);
    return TERRAIN_RULES[terrain].moveCost;
}

function isPassable(x, y) {
    return TERRAIN_RULES[getTerrainClass(x, y)].passable;
}

function chooseResourceTargets(limit = TARGET_POOL_SIZE) {
    const strategy = currentStrategy();
    const searchRadius = 18 + Math.floor(sharedStats.mind * 0.6);
    const candidates = [];

    for (let dy = -searchRadius; dy <= searchRadius; dy++) {
        for (let dx = -searchRadius; dx <= searchRadius; dx++) {
            const tx = avatarX + dx;
            const ty = avatarY + dy;
            if (tx === avatarX && ty === avatarY) continue;
            if (!isPassable(tx, ty)) continue;
            if (!isWithinDailyMoveRadius(tx, ty)) continue;
            if (isReservedByOther(tx, ty)) continue;
            if (!canUseTarget(tx, ty)) continue;

            const state = getOrInitState(tx, ty);
            if (state.remaining <= 0) continue;

            const seed = getOrCreateSeed(tx, ty);
            if (seed.terrainClass === "structure") continue;
            const dist = Math.abs(dx) + Math.abs(dy);
            const moveCost = movementCostAt(tx, ty);
            const typeWeight = strategy.weights[seed.mainType] || 1;
            const amountFactor = state.remaining / seed.maxCapacity;
            const homePenalty = Math.max(0, (Math.abs(tx - HOME_X) + Math.abs(ty - HOME_Y) - 12) * 0.015);
            const terrainBonus = seed.terrainClass === "forest" && strategyId === "herb" ? 0.45 : seed.terrainClass === "mountain" && strategyId === "rare" ? 0.55 : 0;
            const heatPenalty = getChunkHeatAt(tx, ty) * 0.35;
            const score = typeWeight * (1.6 + amountFactor + terrainBonus) - dist * 0.085 - moveCost * 0.28 - homePenalty - heatPenalty;
            candidates.push({ x: tx, y: ty, score, seed, heat: getChunkHeatAt(tx, ty) });
        }
    }
    candidates.sort((a, b) => b.score - a.score);
    return candidates.slice(0, limit);
}

function shouldReturnHome() {
    if (isAtHome()) return false;
    const bagThreshold = Math.floor(avatarBagCap * bagReturnRatio);
    const bagLoad = totalInventoryLoad();
    if (bagLoad >= bagThreshold) return true;
    if (avatarHp <= Math.floor(getAvatarMaxHp() * BALANCE_CONFIG.combat.lowHpReturnRatio)) return true;
    if ((avatarInventory.bloodPill || 0) <= bloodPillReturnThreshold) {
        const hasStock = (homeInventory.bloodPill || 0) > 0;
        const canBuy = autoBuyBloodPill && goldCoins >= getShopPrice(42);
        if (hasStock || canBuy) return true;
    }
    if (avatarInventory.rareCrystal >= 3) return true;
    return false;
}

function handleBloodPillResupplyAtHome() {
    const bagNow = avatarInventory.bloodPill || 0;
    if (bagNow >= bloodPillCarryTarget) return;
    const need = bloodPillCarryTarget - bagNow;
    const stockTake = Math.min(need, homeInventory.bloodPill || 0);
    if (stockTake > 0) {
        homeInventory.bloodPill -= stockTake;
        avatarInventory.bloodPill = (avatarInventory.bloodPill || 0) + stockTake;
        addLog(`自动补给：回血丹 +${stockTake}（库存转移）`);
    }
    const remain = bloodPillCarryTarget - (avatarInventory.bloodPill || 0);
    if (remain > 0 && autoBuyBloodPill) {
        const price = getShopPrice(42);
        const affordable = Math.floor(goldCoins / price);
        const buyCount = Math.max(0, Math.min(remain, affordable));
        if (buyCount > 0) {
            buyFromShop("bloodPill", price * buyCount, buyCount);
            homeInventory.bloodPill = Math.max(0, (homeInventory.bloodPill || 0) - buyCount);
            avatarInventory.bloodPill = (avatarInventory.bloodPill || 0) + buyCount;
            addLog(`自动补给：回血丹 +${buyCount}（金币购买）`);
        }
    }
}

function depositAvatarInventoryToHome() {
    const moved = [];
    Object.keys(avatarInventory).forEach((key) => {
        const amount = avatarInventory[key];
        if (amount > 0) {
            homeInventory[key] += amount;
            avatarInventory[key] = 0;
            const name = RESOURCE_META[key]?.label || ITEM_DEFS[key]?.label || key;
            moved.push(`${name} ${amount}`);
        }
    });
    if (moved.length) {
        addLog(`化身已入库：${moved.join(" / ")}`);
        updateSidePanels();
        updateStatus();
        updateMovementStatus();
    }
    avatarHp = getAvatarMaxHp();
    avatarMp = getAvatarMaxMp();
}

function isWithinDailyMoveRadius(x, y) {
    const dx = x - dayOriginX;
    const dy = y - dayOriginY;
    return Math.hypot(dx, dy) <= DAILY_MOVE_RADIUS;
}

function hasValidExploreTarget() {
    if (!exploreTarget) return false;
    if (!isWithinDailyMoveRadius(exploreTarget.x, exploreTarget.y)) return false;
    if (!isPassable(exploreTarget.x, exploreTarget.y)) return false;
    if (isReservedByOther(exploreTarget.x, exploreTarget.y)) return false;
    const seed = getOrCreateSeed(exploreTarget.x, exploreTarget.y);
    if (seed.terrainClass === "structure") return false;
    const state = getOrInitState(exploreTarget.x, exploreTarget.y);
    return state.remaining > 0;
}

function pickStepToward(targetX, targetY) {
    const candidates = [];
    const dx = targetX - avatarX;
    const dy = targetY - avatarY;

    if (dx !== 0) candidates.push({ x: avatarX + Math.sign(dx), y: avatarY });
    if (dy !== 0) candidates.push({ x: avatarX, y: avatarY + Math.sign(dy) });

    candidates.push({ x: avatarX + 1, y: avatarY });
    candidates.push({ x: avatarX - 1, y: avatarY });
    candidates.push({ x: avatarX, y: avatarY + 1 });
    candidates.push({ x: avatarX, y: avatarY - 1 });

    const deduped = [];
    const seen = new Set();
    for (const step of candidates) {
        const key = `${step.x},${step.y}`;
        if (!seen.has(key)) {
            seen.add(key);
            deduped.push(step);
        }
    }

    deduped.sort((a, b) => {
        const aDist = Math.abs(targetX - a.x) + Math.abs(targetY - a.y);
        const bDist = Math.abs(targetX - b.x) + Math.abs(targetY - b.y);
        const aCost = movementCostAt(a.x, a.y);
        const bCost = movementCostAt(b.x, b.y);
        return aDist - bDist || aCost - bCost;
    });

    return deduped.find((step) => isPassable(step.x, step.y) && movementCostAt(step.x, step.y) !== Infinity) || null;
}

function moveOneStep(targetX, targetY) {
    const step = pickStepToward(targetX, targetY);
    if (!step) {
        movementStatusText = "前方为大水或死路，改道失败";
        return false;
    }
    if (!isWithinDailyMoveRadius(step.x, step.y)) {
        movementStatusText = `今日活动半径已达 ${DAILY_MOVE_RADIUS} 格，返城中`;
        autoObjective = "return_home";
        return false;
    }

    avatarX = step.x;
    avatarY = step.y;
    lastMoveAtMs = simulationTimeMs;
    dayMoveCount += 1;
    dayMoveLogBatch += 1;
    if (dayMoveLogBatch >= 5 || autoObjective === "return_home") dayMoveLogBatch = 0;
    movementStatusText = `今日已移动 ${dayMoveCount} 格，当前位置 (${avatarX}, ${avatarY})`;
    return true;
}

function getTargetReachability(target) {
    if (!target) return "无目标";
    return isWithinDailyMoveRadius(target.x, target.y) ? "可达" : "不可达";
}

function getGatherDurationMs(seed) {
    const terrainCost = seed.terrainClass === "mountain" ? 2200 : seed.terrainClass === "forest" ? 900 : 0;
    const buildingBonus = countBuildingsByType("spiritWell") * 220 + countBuildingsByType("trainingRoom") * 180;
    const speedBonus = buildingBonus + sharedStats.control * 110 + sharedStats.spirit * 120;
    return Math.max(3800, BALANCE_CONFIG.timing.gatherBaseMs + terrainCost - speedBonus);
}

function updateGatheringRing() {
    document.querySelectorAll(".gathering").forEach((el) => el.remove());
    if (!isGathering || !gatheringTarget) return;

    const cell = document.querySelector(`.cell[data-wx="${avatarX}"][data-wy="${avatarY}"]`);
    if (!cell) return;

    const ring = document.createElement("div");
    ring.className = "gathering";
    ring.innerHTML = `
        <svg class="progress-ring" width="56" height="56">
            <circle class="progress-ring__circle" stroke="#88ffaa" stroke-width="5" fill="transparent" r="23" cx="28" cy="28"
                stroke-dasharray="144.5" stroke-dashoffset="144.5"></circle>
        </svg>
        <div class="progress-text">${Math.ceil(gatherRemainingMs / 1000)}s</div>
    `;
    cell.appendChild(ring);
    const circle = ring.querySelector("circle");
    circle.style.strokeDashoffset = 144.5 * (1 - gatheringProgress);
}

function startGathering(tx, ty) {
    if (isGathering || avatarX !== tx || avatarY !== ty) return;
    const monster = getMonsterAt(tx, ty);
    if (monster) {
        startBattleWith(monster);
        return;
    }
    const state = getOrInitState(tx, ty);
    if (state.remaining <= 0) {
        addLog("此地灵机已枯竭");
        return;
    }

    const seed = getOrCreateSeed(tx, ty);
    if (!acquireReservation(tx, ty)) {
        addLog("目标地块已被其他化身占用，重新择点");
        markTargetBackoff(tx, ty);
        exploreTarget = null;
        return;
    }
    const resourceKey = resourceKeyFromSeed(seed);
    const unitWeight = resourceUnitWeight(resourceKey);
    const capacityLeft = avatarBagCap - totalInventoryLoad();
    if (capacityLeft < unitWeight) {
        addLog("化身背包已满，切换为回城优先");
        releaseReservation(tx, ty);
        autoObjective = "return_home";
        exploreTarget = null;
        return;
    }
    isGathering = true;
    gatheringTarget = { x: tx, y: ty };
    exploreTarget = { x: tx, y: ty };
    gatherTotalMs = getGatherDurationMs(seed);
    gatherRemainingMs = gatherTotalMs;
    gatheringProgress = 0;
    addLog(`开始采集 ${RESOURCE_META[resourceKeyFromSeed(seed)].label}，预计 ${Math.ceil(gatherTotalMs / 1000)} 秒`);
    updateGatheringRing();
}

function finishGathering() {
    if (!gatheringTarget) return;

    const { x, y } = gatheringTarget;
    const state = getOrInitState(x, y);
    const seed = getOrCreateSeed(x, y);
    const harvestRoll = simpleHash(x + gatherCount * 17, y + dayCount * 29);
    const baseAmount = Math.min(2 + (harvestRoll % 5), state.remaining);
    const resourceKey = resourceKeyFromSeed(seed);
    const heat = getChunkHeatAt(x, y);
    const heatMultiplier = Math.max(0.35, 1 - heat * 0.06);
    const amountByHeat = Math.max(1, Math.floor(baseAmount * heatMultiplier));
    const unitWeight = resourceUnitWeight(resourceKey);
    const capacityLeft = Math.max(0, avatarBagCap - totalInventoryLoad());
    const maxByCap = Math.floor(capacityLeft / unitWeight);
    const amount = Math.max(0, Math.min(amountByHeat, maxByCap, state.remaining));

    if (amount > 0) {
        state.remaining -= amount;
        state.depletion += amount;
        avatarInventory[resourceKey] += amount;
        dayGatherUnits += amount;
        addChunkHeatAt(x, y, 1 + amount * 0.6);
        updateSidePanels();
        updateStatus();
        updateMovementStatus();
    } else {
        addLog("化身背包容量不足，本次未能采集");
    }

    gatherCount += 1;
    isGathering = false;
    gatherRemainingMs = 0;
    gatherTotalMs = 0;
    gatheringProgress = 0;
    gatheringTarget = null;
    releaseReservation(x, y);
    exploreTarget = null;
    document.querySelectorAll(".gathering").forEach((el) => el.remove());

    if (amount > 0) {
        addLog(`采集完成，获得 ${RESOURCE_META[resourceKey].label} ×${amount}（热度${heat.toFixed(1)}）`);
    }
    if (shouldReturnHome()) {
        autoObjective = "return_home";
    }
}

function autoExploreStep(elapsedMs = 100) {
    if (isGathering) return;
    if (avatarSessionExpired) {
        isAutoMode = false;
        movementStatusText = "化身在线时长已达12小时，需重新登录";
        return;
    }
    if (avatarHp <= 0) {
        const remain = Math.max(0, Math.ceil((avatarReviveUntilMs - simulationTimeMs) / 1000));
        movementStatusText = remain > 0 ? `化身复活冷却中，剩余 ${remain}s` : "化身待复活";
        autoObjective = "return_home";
        return;
    }
    if (battleState) {
        resolveBattleStep(elapsedMs);
        return;
    }

    if (autoObjective === "return_home") {
        releaseExploreTargetReservation();
        exploreTarget = null;
        if (isAtHome()) {
            depositAvatarInventoryToHome();
            handleBloodPillResupplyAtHome();
            avatarHp = getAvatarMaxHp();
            avatarMp = getAvatarMaxMp();
            autoObjective = "explore";
            addLog("已返回洞府，完成整备");
            return;
        }
        moveOneStep(HOME_X, HOME_Y);
        return;
    }

    if (shouldReturnHome()) {
        releaseExploreTargetReservation();
        exploreTarget = null;
        autoObjective = "return_home";
        addLog("触发补给/整备条件，切换为回城优先");
        return;
    }

    if (!hasValidExploreTarget()) {
        releaseExploreTargetReservation();
        const pool = chooseResourceTargets(TARGET_POOL_SIZE);
        exploreTarget = null;
        for (const candidate of pool) {
            if (acquireReservation(candidate.x, candidate.y)) {
                exploreTarget = candidate;
                break;
            }
            markTargetBackoff(candidate.x, candidate.y);
        }
    } else if (exploreTarget) {
        if (!acquireReservation(exploreTarget.x, exploreTarget.y)) {
            markTargetBackoff(exploreTarget.x, exploreTarget.y);
            exploreTarget = null;
        }
    }

    const target = exploreTarget;
    if (!target) {
        addLog("附近暂未发现值得采集的资源点，返城待命");
        autoObjective = "return_home";
        return;
    }

    if (avatarX === target.x && avatarY === target.y) {
        startGathering(target.x, target.y);
        return;
    }

    moveOneStep(target.x, target.y);
    const encountered = getMonsterAt(avatarX, avatarY);
    if (encountered) {
        startBattleWith(encountered);
    }
}

function formatCostLine(cost) {
    if (!cost) return "无";
    const parts = [];
    if (cost.spiritStone) parts.push(`灵石 ${cost.spiritStone}`);
    if (cost.wood) parts.push(`灵木 ${cost.wood}`);
    if (cost.herb) parts.push(`灵草 ${cost.herb}`);
    if (cost.rareCrystal) parts.push(`异晶 ${cost.rareCrystal}`);
    return parts.join(" / ");
}

function formatCostStockLine(cost) {
    if (!cost) return '<div class="mat-line"><span class="mat-item mat-ok">无消耗</span></div>';
    const specs = [
        { key: "spiritStone", label: "灵石" },
        { key: "wood", label: "灵木" },
        { key: "herb", label: "灵草" },
        { key: "rareCrystal", label: "异晶" }
    ];
    const parts = [];
    for (const spec of specs) {
        const need = cost[spec.key] || 0;
        if (need <= 0) continue;
        const have = homeInventory[spec.key] || 0;
        const ok = have >= need;
        parts.push(`<span class="mat-item ${ok ? "mat-ok" : "mat-bad"}">${spec.label} ${have}/${need}</span>`);
    }
    return `<div class="mat-line">${parts.join("")}</div>`;
}

function canAffordCost(cost) {
    if (!cost) return true;
    return (
        homeInventory.spiritStone >= (cost.spiritStone || 0) &&
        homeInventory.wood >= (cost.wood || 0) &&
        homeInventory.herb >= (cost.herb || 0) &&
        homeInventory.rareCrystal >= (cost.rareCrystal || 0)
    );
}

function closeBuildPanel() {
    buildPanel.classList.add("hidden");
    buildPanel.innerHTML = "";
    buildPanelTile = null;
    if (isBuildFocus) {
        isBuildFocus = false;
        addLog("已退出洞府建设视图");
        renderAll();
    }
}

function performHomeBuildAction(wx, wy, action, targetType = null) {
    if (!isHomeBuildTile(wx, wy)) {
        addLog("只能在洞府 5x5 范围内建设");
        return false;
    }
    if (isGathering || isMeditating) {
        addLog("当前行为进行中，暂不能建设");
        return false;
    }

    const current = getHomeBuilding(wx, wy);
    if (action === "inspect") {
        if (current) {
            const conf = getBuildingConfig(current.type);
            addLog(`该地块：${conf ? conf.label : current.type} Lv.${current.level}`);
        } else {
            addLog("该地块为空地");
        }
        return true;
    }
    if (action === "remove") {
        if (!current) {
            addLog("该地块没有建筑可拆除");
            return false;
        }
        const refundStone = 10 * current.level;
        homeInventory.spiritStone += refundStone;
        setHomeBuilding(wx, wy, null);
        addLog(`拆除完成，返还灵石 ${refundStone}`);
        return true;
    }
    if (action === "upgrade") {
        if (!current) {
            addLog("该地块为空，无法升级");
            return false;
        }
        const conf = getBuildingConfig(current.type);
        const upgradeCost = conf ? conf.upgradeCost : null;
        if (!applyCost(upgradeCost)) {
            addLog("升级材料不足");
            return false;
        }
        current.level += 1;
        setHomeBuilding(wx, wy, current);
        addLog(`${conf ? conf.label : current.type} 升级到 Lv.${current.level}`);
        return true;
    }

    if (action !== "build") return false;
    const conf = getBuildingConfig(targetType);
    if (!conf || conf.id === "none") return false;
    if (current) {
        addLog("该地块已有建筑，请先拆除或切换升级模式");
        return false;
    }
    if (!applyCost(conf.buildCost)) {
        addLog(`建造 ${conf.label} 材料不足`);
        return false;
    }
    setHomeBuilding(wx, wy, { type: conf.id, level: 1 });
    addLog(`建造完成：${conf.label} Lv.1`);
    return true;
}

function openBuildPanel(wx, wy) {
    if (!isHomeBuildTile(wx, wy)) return;
    if (zoomLevel > 1) zoomLevel = 1;
    isBuildFocus = true;
    buildPanelTile = { x: wx, y: wy };

    const current = getHomeBuilding(wx, wy);
    const currentTitle = current
        ? `${getBuildingConfig(current.type)?.label || current.type} Lv.${current.level}`
        : "空地";

    let html = `<div style="font-weight:700; margin-bottom:6px;">洞府建设面板</div>`;
    html += `<div class="build-meta">主角驻守洞府执事中，支持远程建设（化身可在外探索）</div>`;
    html += `<div class="build-meta">目标瓦片: (${wx}, ${wy}) · 当前建筑: ${currentTitle}</div>`;
    html += `<div class="build-meta" style="margin:6px 0 10px;">洞府库存: 灵石 ${homeInventory.spiritStone} / 灵木 ${homeInventory.wood} / 灵草 ${homeInventory.herb} / 异晶 ${homeInventory.rareCrystal}</div>`;

    if (current) {
        const conf = getBuildingConfig(current.type);
        const canUpgrade = canAffordCost(conf?.upgradeCost);
        html += `
            <div class="build-row">
                <div>
                    <div><strong>升级 ${conf ? conf.label : current.type}</strong></div>
                    <div class="build-meta">需求: ${formatCostLine(conf?.upgradeCost)}</div>
                    ${formatCostStockLine(conf?.upgradeCost)}
                    <div class="build-meta ${canUpgrade ? "" : "mini-meta-warn"}">${canUpgrade ? "库存满足" : "材料不足，点击可查看提示"}</div>
                    <div class="build-meta">效果: ${conf?.effect || "-"}</div>
                </div>
                <button class="mini-btn" data-build-action="upgrade">升级</button>
            </div>
            <div class="build-row">
                <div>
                    <div><strong>拆除建筑</strong></div>
                    <div class="build-meta">返还: 灵石 ${10 * current.level}</div>
                </div>
                <button class="mini-btn" data-build-action="remove">拆除</button>
            </div>
        `;
    } else {
        for (const conf of BUILDING_TYPES.filter((item) => item.id !== "none")) {
            const canBuild = canAffordCost(conf.buildCost);
            html += `
                <div class="build-row">
                    <div>
                        <div><strong>${conf.icon} ${conf.label}</strong></div>
                        <div class="build-meta">需求: ${formatCostLine(conf.buildCost)}</div>
                        ${formatCostStockLine(conf.buildCost)}
                        <div class="build-meta ${canBuild ? "" : "mini-meta-warn"}">${canBuild ? "库存满足" : "材料不足，点击可查看提示"}</div>
                        <div class="build-meta">效果: ${conf.effect}</div>
                    </div>
                    <button class="mini-btn" data-build-action="build" data-build-type="${conf.id}">建造</button>
                </div>
            `;
        }
    }
    html += `<div style="display:flex; gap:8px; margin-top:10px;"><button class="mini-btn" data-build-action="inspect">查看</button><button class="mini-btn" data-build-action="close">关闭</button></div>`;

    buildPanel.innerHTML = html;
    buildPanel.classList.remove("hidden");

    buildPanel.querySelectorAll("button[data-build-action]").forEach((btn) => {
        btn.addEventListener("click", () => {
            const action = btn.dataset.buildAction;
            const type = btn.dataset.buildType || null;
            if (!buildPanelTile) return;
            if (action === "close") {
                closeBuildPanel();
                return;
            }
            const ok = performHomeBuildAction(buildPanelTile.x, buildPanelTile.y, action, type);
            if (ok || action === "inspect") {
                openBuildPanel(buildPanelTile.x, buildPanelTile.y);
                renderAll();
            }
        });
    });
}

function getChunkInfo(cx, cy, span) {
    const terrain = getTerrainClass(cx, cy);
    const seed = getOrCreateSeed(cx, cy);
    const state = getOrInitState(cx, cy);
    const includesHome = Math.abs(cx - HOME_X) <= Math.floor(span / 2) && Math.abs(cy - HOME_Y) <= Math.floor(span / 2);
    return { terrain, seed, state, includesHome };
}

function formatChunkTooltip(wx, wy, span) {
    const info = getChunkInfo(wx, wy, span);
    const terrainLabel = TERRAIN_RULES[info.terrain].label;
    const resourceKey = resourceKeyFromSeed(info.seed);
    const heat = getChunkHeatAt(wx, wy);
    let text = span === 1 ? `坐标: (${wx}, ${wy})\n` : `地块中心: (${wx}, ${wy})\n覆盖范围: ${span}x${span}\n`;
    text += `地形: ${terrainLabel}\n`;
    text += `主资源: ${RESOURCE_META[resourceKey].label}\n`;
    text += `剩余: ${info.state.remaining}/${info.seed.maxCapacity}`;
    text += `\n区域热度: ${heat.toFixed(1)}`;
    if (!TERRAIN_RULES[info.terrain].passable) {
        text += `\n此地不可通行`;
    } else {
        text += `\n移动消耗: ${TERRAIN_RULES[info.terrain].moveCost}`;
    }
    if (info.includesHome) {
        text += `\n此区域包含洞府`;
    }
    if (span === 1 && isHomeBuildTile(wx, wy)) {
        const building = getHomeBuilding(wx, wy);
        if (building) {
            const conf = getBuildingConfig(building.type);
            text += `\n洞府建筑: ${conf ? conf.label : building.type} Lv.${building.level}`;
        } else {
            text += `\n洞府建筑: 空地`;
        }
    }
    if (span === 1) {
        const reservation = getReservationAt(wx, wy);
        if (reservation) {
            text += `\n占位状态: ${reservation.owner === PLAYER_ID ? "本地占用" : "他人占用"}`;
        }
        const monster = getMonsterAt(wx, wy);
        if (monster) {
            text += `\n妖物: ${monster.type} Lv.${monster.level} HP ${monster.hp}/${monster.maxHp}`;
            text += `\n可达性: ${isWithinDailyMoveRadius(wx, wy) ? "可达" : "不可达（超出当日15格半径）"}`;
            const profile = getMonsterDropProfile(monster.type);
            if (profile) {
                text += `\n掉落率: ${profile.drops.map((d) => `${ITEM_DEFS[d.id]?.label || d.id} ${d.chance}`).join(" / ")}`;
            }
        }
    }
    return text;
}

function updateHeader() {
    document.getElementById("coord-x").textContent = avatarX;
    document.getElementById("coord-y").textContent = avatarY;
    document.getElementById("camera-mode-label").textContent = cameraMode === "follow" ? "跟随" : "自由";
    document.getElementById("camera-x").textContent = cameraMode === "follow" ? avatarX : cameraX;
    document.getElementById("camera-y").textContent = cameraMode === "follow" ? avatarY : cameraY;
    document.getElementById("zoom-label").textContent = ZOOM_LEVELS[zoomLevel].label;
    document.getElementById("day-count").textContent = dayCount;
    const realmNameEl = document.getElementById("realm-name");
    realmNameEl.className = getRealmStyleClass();
    realmNameEl.textContent = `Lv.${cultivationLevel} ${getRealmName()}`;
    if (worldEventTopEl) {
        const eventDef = getWorldEventDef();
        if (!eventDef) {
            worldEventTopEl.innerHTML = `世界事件：无 <span class="q">?</span>`;
            worldEventTopEl.title = "当前无世界事件";
        } else {
            const remain = Math.max(0, Math.ceil((worldEventUntilMs - simulationTimeMs) / 1000));
            const effects = getWorldEventEffects();
            const detail = [
                effects.dropMul ? `掉落倍率 +${Math.round(effects.dropMul * 100)}%` : null,
                effects.monsterSpawnAdd ? `刷怪率 +${Math.round(effects.monsterSpawnAdd * 100)}%` : null,
                effects.monsterDamageMul ? `怪物伤害 +${Math.round(effects.monsterDamageMul * 100)}%` : null,
                effects.cultivationMul ? `修炼效率 +${Math.round(effects.cultivationMul * 100)}%` : null
            ].filter(Boolean).join("；") || "无额外影响";
            worldEventTopEl.innerHTML = `世界事件：${eventDef.label} (${remain}s) <span class="q">?</span>`;
            worldEventTopEl.title = `旁白：${eventDef.desc || eventDef.label}\n影响：${detail}`;
        }
    }
}

function renderMap() {
    const cfg = ZOOM_LEVELS[zoomLevel];
    const half = Math.floor(cfg.size / 2);
    if (!isBuildFocus && cameraMode === "follow") {
        cameraX = avatarX;
        cameraY = avatarY;
    }
    const centerX = isBuildFocus ? HOME_X : (cameraMode === "follow" ? avatarX : cameraX);
    const centerY = isBuildFocus ? HOME_Y : (cameraMode === "follow" ? avatarY : cameraY);
    grid.style.gridTemplateColumns = `repeat(${cfg.size}, ${cfg.cellPx}px)`;
    grid.style.gridTemplateRows = `repeat(${cfg.size}, ${cfg.cellPx}px)`;
    grid.innerHTML = "";

    for (let gy = -half; gy <= half; gy++) {
        for (let gx = -half; gx <= half; gx++) {
            const wx = centerX + gx * cfg.span;
            const wy = centerY + gy * cfg.span;
            const info = getChunkInfo(wx, wy, cfg.span);
            const resourceKey = resourceKeyFromSeed(info.seed);

            const cell = document.createElement("div");
            cell.className = `cell ${info.terrain}${TERRAIN_RULES[info.terrain].passable ? "" : " impassable"}`;
            cell.dataset.wx = wx;
            cell.dataset.wy = wy;
            cell.dataset.span = cfg.span;
            if (cfg.span === 1 && isHomeBuildTile(wx, wy)) {
                cell.classList.add("home-build-zone");
                if (wy === HOME_Y - HOME_BUILD_RADIUS) cell.classList.add("home-edge-top");
                if (wy === HOME_Y + HOME_BUILD_RADIUS) cell.classList.add("home-edge-bottom");
                if (wx === HOME_X - HOME_BUILD_RADIUS) cell.classList.add("home-edge-left");
                if (wx === HOME_X + HOME_BUILD_RADIUS) cell.classList.add("home-edge-right");
            }

            if (wx === avatarX && wy === avatarY) {
                if (gx === 0 && gy === 0) cell.dataset.center = "true";
                const visual = getAvatarVisualState();
                const av = document.createElement("div");
                av.className = `avatar ${visual.css}`;
                av.innerHTML = `<span class="avatar-main">${cfg.span <= 2 ? "🧍" : "◉"}</span><span class="avatar-badge">${visual.badge}</span>`;
                cell.appendChild(av);
            }

            if (wx === HOME_X && wy === HOME_Y) {
                const host = document.createElement("div");
                host.className = "home-tag";
                host.textContent = "主";
                cell.appendChild(host);
            }

            if (cfg.span >= 4 && cfg.span < 16) {
                const chunkTag = document.createElement("div");
                chunkTag.className = "chunk-tag";
                chunkTag.textContent = cfg.span >= 16 ? "群" : "区";
                cell.appendChild(chunkTag);
            }

            if (info.includesHome) {
                const homeTag = document.createElement("div");
                homeTag.className = "home-tag";
                homeTag.textContent = "⌂";
                cell.appendChild(homeTag);
            }

            if (cfg.span === 1 && isHomeBuildTile(wx, wy)) {
                const building = getHomeBuilding(wx, wy);
                if (building) {
                    const conf = getBuildingConfig(building.type);
                    const tag = document.createElement("div");
                    tag.className = "chunk-tag";
                    tag.textContent = `${conf ? conf.icon : "□"}${building.level}`;
                    tag.style.left = "auto";
                    tag.style.right = "2px";
                    tag.style.top = "2px";
                    cell.appendChild(tag);
                }
            }

            if (info.state.remaining > 0 && cfg.span < 16) {
                const tag = document.createElement("div");
                tag.className = "resource-tag";
                tag.textContent = RESOURCE_META[resourceKey].icon;
                tag.style.opacity = String(Math.max(0.35, info.state.remaining / info.seed.maxCapacity));
                cell.appendChild(tag);
            }

            if (autoObjective === "return_home" && info.includesHome) {
                const targetTag = document.createElement("div");
                targetTag.className = "target-tag";
                targetTag.textContent = "归";
                cell.appendChild(targetTag);
            } else if (exploreTarget && exploreTarget.x === wx && exploreTarget.y === wy && cfg.span === 1) {
                const targetTag = document.createElement("div");
                targetTag.className = "target-tag";
                targetTag.textContent = "采";
                cell.appendChild(targetTag);
            } else if (cfg.span === 1) {
                const monster = getMonsterAt(wx, wy);
                if (monster) {
                    cell.classList.add("monster-cell");
                    if (monster.type === "精英妖将") cell.classList.add("monster-elite");
                    if (monster.type === "天劫妖王") cell.classList.add("monster-boss");
                    const targetTag = document.createElement("div");
                    targetTag.className = "target-tag";
                    targetTag.textContent = monster.type === "天劫妖王" ? "王" : monster.type === "精英妖将" ? "精" : "妖";
                    cell.appendChild(targetTag);
                } else {
                    const reservation = getReservationAt(wx, wy);
                    if (reservation) {
                        const targetTag = document.createElement("div");
                        targetTag.className = "target-tag";
                        targetTag.textContent = reservation.owner === PLAYER_ID ? "占" : "锁";
                        cell.appendChild(targetTag);
                    }
                }
            }

            grid.appendChild(cell);
        }
    }

    updateHeader();
    updateGatheringRing();
}

function updateCultivationPanel() {
    const tickProgress = Math.max(0, Math.min(1, bodyCultivationAccumMs / BODY_CULTIVATION_TICK_MS));
    if (cultivationTickRingEl) {
        cultivationTickRingEl.style.strokeDashoffset = String(138.2 * (1 - tickProgress));
        cultivationTickRingEl.style.stroke = bodyCultivationExp >= getBodyCultivationExpNeed(cultivationLevel)
            ? "#ffd36f"
            : "#8fd9ff";
    }
    const curNeed = getBodyCultivationExpNeed(cultivationLevel);
    const remain = Math.max(0, curNeed - bodyCultivationExp);
    if (cultivationMetaEl) {
        cultivationMetaEl.innerHTML = `
            境界 ${getRealmStyledText()} · 修为 ${bodyCultivationExp}/${curNeed}<br>
            打坐 ${isMeditating ? `进行中 ${Math.ceil(meditateRemainingMs / 1000)}s` : "待机"} · 下次修炼结算 ${Math.max(1, Math.ceil((BODY_CULTIVATION_TICK_MS - bodyCultivationAccumMs) / 1000))}s<br>
            距离下一级：${remain} 修为 · 效率 x${getCultivationRateMultiplier().toFixed(1)}

}

function updateBattlePanel() {
    if (battleInfoModeBtn) battleInfoModeBtn.textContent = battleInfoMode === "detail" ? "完整模式" : "简化模式";
    if (battlePanelEl) battlePanelEl.classList.toggle("simple-mode", battleInfoMode === "simple");
    if (!battleState) {
        if (!battleSummaryData || simulationTimeMs - battleSummaryData.atMs > 10000) {
            battlePanelEl.classList.add("hidden");
            return;
        }
        if (battleSelfCardEl) battleSelfCardEl.classList.remove("active");
        if (battleEnemyCardEl) battleEnemyCardEl.classList.remove("active");
        if (battleTurnBannerEl) battleTurnBannerEl.textContent = "战斗已结束";
        if (battleSelfStatusEl) battleSelfStatusEl.textContent = "待命";
        if (battleEnemyStatusEl) battleEnemyStatusEl.textContent = "已结算";
        battleSummaryEl.innerHTML = `⚔ 战斗结算 · ${battleSummaryData.result}`;
        battleRoundResultEl.textContent = `${battleSummaryData.result} · ${battleSummaryData.enemy}`;
        battleRoundResultEl.classList.toggle("minor", battleSummaryData.result !== "胜利");
        battleLogListEl.innerHTML = "";
        battleLogListEl.style.display = "none";
        const enemyHpEnd = Math.max(0, battleSummaryData.enemyHpEnd ?? 0);
        const enemyHpMax = Math.max(1, battleSummaryData.enemyMaxHp ?? 1);
        const enemyPct = Math.round((enemyHpEnd / enemyHpMax) * 100);
        battleEnemyLabelEl.textContent = "敌方";
        battleEnemyValueEl.textContent = `${enemyHpEnd}/${enemyHpMax} (${enemyPct}%)`;
        battleEnemyFillBarEl.style.transform = `scaleX(${enemyPct / 100})`;
        battleEnemyLagBarEl.style.transform = `scaleX(${enemyPct / 100})`;
        battleUiEnemyHpDisplay = enemyHpEnd;
        if (battleEnemyCdFillEl) battleEnemyCdFillEl.style.transform = "scaleX(0)";
        if (battleSelfCdFillEl) battleSelfCdFillEl.style.transform = "scaleX(0)";
        battleResultCardEl.innerHTML = `
            时长 ${battleSummaryData.durationSec || battleSummaryData.rounds}s ｜ 回合 ${battleSummaryData.rounds} ｜ 总伤害 ${battleSummaryData.dealt} ｜ 承伤 ${battleSummaryData.taken} ｜ 暴击 ${battleSummaryData.crits} ｜ 治疗 ${battleSummaryData.healed || 0}<br>
            战利品：${battleSummaryData.loot}
        `;
        if (battleInfoMode === "detail") {
            battleResultCardEl.innerHTML += `<br>结算时间：第 ${dayCount} 天 · ${Math.floor(simulationTimeMs / 1000)}s`;
        }
        battleResultCardEl.classList.remove("hidden");
        battlePanelEl.classList.remove("hidden");
        return;
    }
    const profile = getMonsterDropProfile(battleState.type);
    const dropPreview = profile ? profile.drops.map((d) => `${ITEM_DEFS[d.id]?.label || d.id} ${d.chance}`).join(" / ") : "灵石 100%";
    const enemyPct = Math.max(0, Math.round((battleState.hp / Math.max(1, battleState.maxHp)) * 100));
    const selfPct = Math.max(0, Math.round((avatarHp / Math.max(1, getAvatarMaxHp())) * 100));
    const isBossTier = battleState.type === "天劫妖王" || battleState.type === "精英妖将";
    const bossTag = battleState.type === "天劫妖王" ? "【BOSS】" : battleState.type === "精英妖将" ? "【精英】" : "";
    battleSummaryEl.innerHTML = battleInfoMode === "detail"
        ? `⚔ ${bossTag} ${battleState.type} Lv.${battleState.level} · 回合 ${battleState.rounds} · CD模式<br><span class="small-note">战术：${currentBattleTactic().label}｜掉落预览：${dropPreview}</span>`
        : `⚔ ${battleState.type} Lv.${battleState.level}｜CD战斗中`;
    if (battleSelfNameEl) battleSelfNameEl.textContent = "ark1";
    if (battleEnemyLabelEl) battleEnemyLabelEl.textContent = `${bossTag || ""}${battleState.type}`;
    if (battleSelfStatusEl) battleSelfStatusEl.textContent = `攻击CD ${Math.ceil((battleState.playerCdMs || 0) / 1000)}s`;
    if (battleEnemyStatusEl) battleEnemyStatusEl.textContent = `攻击CD ${Math.ceil((battleState.enemyCdMs || 0) / 1000)}s / ${((battleState.enemyAttackCdMs || 5000) / 1000).toFixed(1)}s`;
    if (battleTurnBannerEl) battleTurnBannerEl.textContent = "CD并行攻击";
    if (battleSelfCardEl) battleSelfCardEl.classList.toggle("active", (battleState.playerCdMs || 0) <= 0);
    if (battleEnemyCardEl) battleEnemyCardEl.classList.toggle("active", (battleState.enemyCdMs || 0) <= 0);
    if (battleSelfAvatarEl) battleSelfAvatarEl.textContent = "🧍";
    if (battleEnemyAvatarEl) battleEnemyAvatarEl.textContent = getMonsterAvatar(battleState.type);
    let roundResult = "双方蓄力中...";
    let minor = true;
    if (lastBattleFrame) {
        roundResult = lastBattleFrame.eventText || roundResult;
        minor = !(lastBattleFrame.eventText || "").includes("-");
    }
    battleRoundResultEl.textContent = roundResult;
    battleRoundResultEl.classList.toggle("minor", minor);
    battleUiEnemyHpDisplay = Math.max(battleState.hp, battleUiEnemyHpDisplay - Math.max(1, (battleUiEnemyHpDisplay - battleState.hp) * 0.18));
    battleUiSelfHpDisplay = Math.max(avatarHp, battleUiSelfHpDisplay - Math.max(1, (battleUiSelfHpDisplay - avatarHp) * 0.2));
    const enemyLagPct = Math.max(0, Math.round((battleUiEnemyHpDisplay / Math.max(1, battleState.maxHp)) * 100));
    const selfLagPct = Math.max(0, Math.round((battleUiSelfHpDisplay / Math.max(1, getAvatarMaxHp())) * 100));
    battleEnemyLabelEl.textContent = `${bossTag}敌方`;
    battleEnemyValueEl.textContent = `${battleState.hp}/${battleState.maxHp} (${enemyPct}%)`;
    battleSelfValueEl.textContent = `${avatarHp}/${getAvatarMaxHp()} (${selfPct}%)`;
    battleEnemyFillBarEl.style.transform = `scaleX(${enemyPct / 100})`;
    battleEnemyLagBarEl.style.transform = `scaleX(${enemyLagPct / 100})`;
    battleSelfFillBarEl.style.transform = `scaleX(${selfPct / 100})`;
    battleSelfLagBarEl.style.transform = `scaleX(${selfLagPct / 100})`;
    const selfCdBase = Math.max(1, battleState.playerAttackCdMs || 5000);
    const enemyCdBase = Math.max(1, battleState.enemyAttackCdMs || 5000);
    const selfCdPct = Math.max(0, Math.min(100, Math.round(((battleState.playerCdMs || 0) / selfCdBase) * 100)));
    const enemyCdPct = Math.max(0, Math.min(100, Math.round(((battleState.enemyCdMs || 0) / enemyCdBase) * 100)));
    if (battleSelfCdFillEl) battleSelfCdFillEl.style.transform = `scaleX(${selfCdPct / 100})`;
    if (battleEnemyCdFillEl) battleEnemyCdFillEl.style.transform = `scaleX(${enemyCdPct / 100})`;
    if (battleSelfDeltaEl) {
        const selfLoss = lastBattleFrame?.monsterDmg || 0;
        battleSelfDeltaEl.className = "battle-delta";
        if (selfLoss > 0) {
            battleSelfDeltaEl.textContent = `-${selfLoss} HP`;
            battleSelfDeltaEl.classList.add("hit");
        } else if (lastBattleFrame?.itemText) {
            battleSelfDeltaEl.textContent = lastBattleFrame.itemText;
            battleSelfDeltaEl.classList.add("heal");
        } else {
            battleSelfDeltaEl.textContent = "未受击";
        }
    }
    if (battleEnemyDeltaEl) {
        const enemyLoss = lastBattleFrame?.avatarDmg || 0;
        battleEnemyDeltaEl.className = "battle-delta";
        if (enemyLoss > 0) {
            battleEnemyDeltaEl.textContent = `-${enemyLoss} HP`;
            battleEnemyDeltaEl.classList.add(lastBattleFrame?.crit ? "crit" : "hit");
        } else {
            battleEnemyDeltaEl.textContent = "未命中";
        }
    }
    battleLogListEl.innerHTML = "";
    battleLogListEl.style.display = "none";
    if (battleInfoMode === "simple") {
        if (battleSelfCardEl) battleSelfCardEl.style.display = "none";
        if (battleEnemyCardEl) battleEnemyCardEl.style.display = "none";
        if (battleTurnBannerEl) battleTurnBannerEl.style.display = "none";
        const selfCdSec = Math.ceil((battleState.playerCdMs || 0) / 1000);
        const enemyCdSec = Math.ceil((battleState.enemyCdMs || 0) / 1000);
        const selfLossNow = lastBattleFrame?.monsterDmg || 0;
        const enemyLossNow = lastBattleFrame?.avatarDmg || 0;
        const selfLoss = selfLossNow > 0 ? selfLossNow : (lastDamageSnapshot.selfLoss || 0);
        const enemyLoss = enemyLossNow > 0 ? enemyLossNow : (lastDamageSnapshot.enemyLoss || 0);
        const selfLossText = selfLoss > 0 ? `本轮扣血 -${selfLoss}` : "本轮扣血 无";
        const enemyLossText = enemyLoss > 0 ? `敌方受伤 -${enemyLoss}` : "敌方受伤 无";
        const itemText = lastBattleFrame?.itemText || "无";
        battleRoundResultEl.innerHTML = `
            <div class="summary-line">
                <span class="summary-pill hp">血量 ${avatarHp}/${getAvatarMaxHp()}</span>
                <span class="summary-pill enemy">敌方 ${battleState.hp}/${battleState.maxHp}</span>
                <span class="summary-pill cd">CD倒数 我${selfCdSec}s / 敌${enemyCdSec}s</span>
            </div>
            <div class="summary-line">
                <span class="summary-pill damage">${selfLossText}</span>
                <span class="summary-pill enemy">${enemyLossText}</span>
                <span class="summary-pill heal">道具 ${itemText}</span>
            </div>
        `;
        battleRoundResultEl.classList.add("minor");
    } else {
        if (battleSelfCardEl) battleSelfCardEl.style.display = "";
        if (battleEnemyCardEl) battleEnemyCardEl.style.display = "";
        if (battleTurnBannerEl) {
            battleTurnBannerEl.style.display = "";
            if (lastBattleFrame?.detailText) battleTurnBannerEl.textContent = `CD并行攻击｜${lastBattleFrame.detailText}`;
        }
        battleRoundResultEl.textContent = lastBattleFrame?.eventText || "双方蓄力中...";
    }
    battleResultCardEl.classList.add("hidden");
    battlePanelEl.classList.remove("hidden");
}

function updateSimulation(ms) {
    const scaledMs = ms * timeScale;
    simulationTimeMs += scaledMs;
    if (!avatarSessionExpired) {
        avatarOnlineAccumMs = Math.min(AVATAR_MAX_ONLINE_MS, avatarOnlineAccumMs + scaledMs);
        if (avatarOnlineAccumMs >= AVATAR_MAX_ONLINE_MS) {
            avatarSessionExpired = true;
            isAutoMode = false;
            isGathering = false;
            gatherRemainingMs = 0;
            gatherTotalMs = 0;
            gatheringProgress = 0;
            battleState = null;
            autoObjective = "explore";
            releaseExploreTargetReservation();
            exploreTarget = null;
            movementStatusText = "化身在线12小时已达上限，请重新登录后继续";
            addLog("化身在线12小时已达上限，自动探索停止，需要重新登录");
            renderAll();
            return;
        }
    }
    if (worldEventId && simulationTimeMs >= worldEventUntilMs) {
        addLog(`世界事件结束：${getWorldEventDef()?.label || worldEventId}`);
        worldEventId = "";
        worldEventUntilMs = 0;
    }
    if (simulationTimeMs >= nextWorldEventRollMs) {
        rollWorldEvent();
        nextWorldEventRollMs = simulationTimeMs + 120000 + (simpleHash(dayCount + gatherCount, Math.floor(simulationTimeMs / 1000)) % 120000);
    }
    if (avatarHp <= 0 && avatarReviveUntilMs > 0 && simulationTimeMs >= avatarReviveUntilMs) {
        avatarReviveUntilMs = 0;
        avatarHp = Math.floor(getAvatarMaxHp() * 0.7);
        avatarMp = Math.floor(getAvatarMaxMp() * 0.7);
        autoObjective = "explore";
        addLog("化身已在洞府复活，可重新外出历练");
        renderAll();
    }
    bodyCultivationAccumMs += scaledMs;
    updateCultivationPanel();
    while (bodyCultivationAccumMs >= BODY_CULTIVATION_TICK_MS) {
        bodyCultivationAccumMs -= BODY_CULTIVATION_TICK_MS;
        applyBodyCultivationTick();
        renderAll();
    }
    cleanupReservations();
    buildingProductionAccumMs += scaledMs;
    while (buildingProductionAccumMs >= BALANCE_CONFIG.timing.buildingTickMs) {
        buildingProductionAccumMs -= BALANCE_CONFIG.timing.buildingTickMs;
        runBuildingProductionTick();
        renderAll();
    }

    if (isMeditating) {
        meditateRemainingMs = Math.max(0, meditateRemainingMs - scaledMs);
        if (meditateRemainingMs <= 0) {
            finishMeditation();
            renderAll();
        }
    }

    if (isGathering) {
        gatherRemainingMs = Math.max(0, gatherRemainingMs - scaledMs);
        gatheringProgress = gatherTotalMs === 0 ? 0 : 1 - gatherRemainingMs / gatherTotalMs;
        updateGatheringRing();
        if (gatherRemainingMs <= 0) {
            finishGathering();
            renderAll();
        }
    }

    if (!battleState) {
        avatarMp = Math.min(getAvatarMaxMp(), avatarMp + scaledMs * 0.0032);
    }

    if (isAutoMode && !isGathering) {
        autoAccumulatorMs += scaledMs;
        const stepMs = battleState ? 100 : BALANCE_CONFIG.timing.autoStepMs;
        while (autoAccumulatorMs >= stepMs) {
            autoAccumulatorMs -= stepMs;
            autoExploreStep(stepMs);
            renderAll();
            if (isGathering) break;
        }
    }
}

        avatar: { x: avatarX, y: avatarY, hp: avatarHp, mp: avatarMp, reviveUntilMs: avatarReviveUntilMs },
        day: { dayCount, dayOriginX, dayOriginY, dayMoveCount, dayMoveLogBatch, dayGatherUnits, dayStartMs },
        runtime: { zoomLevel, strategyId, autoObjective, isAutoMode, timeScale, simulationTimeMs, buildingProductionAccumMs, worldEventId, worldEventUntilMs, nextWorldEventRollMs },
        combat: { battleTacticId, autoUsePillRatio, autoUseSalveRatio, bloodPillCarryTarget, bloodPillReturnThreshold, autoBuyBloodPill, injuryDebuffUntilMs, lastBattleFrame },
        flags: { devForceMonster, devFixedDrops, baitBoostUntilMs },
        progression: {
            cultivationLevel,
            meditationLevel,
            meditationExp,
            sharedStats: { ...sharedStats },
            goldCoins,
            bodyCultivationExp,
            bodyCultivationAccumMs,
            avatarOnlineAccumMs,
            avatarSessionExpired,
            cultivationBuffUntilMs,
            equippedSlots: { ...equippedSlots },

        },

        maps: {
            reservations: reservationBackend.list(),
            homeBuildings: Array.from(homeBuildingMap.entries()),
            seedEntries: Array.from(seedMap.entries()),
            stateEntries: Array.from(stateMap.entries()),
            heatEntries: Array.from(chunkHeatMap.entries()),
            monsterEntries: Array.from(monsterStateMap.entries()),
            backoffEntries: Array.from(targetBackoffMap.entries())
        },
        discoveredItems: Array.from(discoveredItemSet)
    };
}

    if (!["inventory", "bag", "equip"].includes(resourcePanelTab)) resourcePanelTab = "inventory";
    if (cameraMode !== "follow" && cameraMode !== "free") cameraMode = "follow";
    EQUIP_SLOT_DEFS.forEach((slot) => {

    if (bloodPillReturnThresholdInput) bloodPillReturnThresholdInput.value = String(bloodPillReturnThreshold);
    if (bloodPillCarryTargetLabel) bloodPillCarryTargetLabel.textContent = String(bloodPillCarryTarget);
    if (bloodPillReturnThresholdLabel) bloodPillReturnThresholdLabel.textContent = String(bloodPillReturnThreshold);
    if (autoBuyBloodPillToggle) autoBuyBloodPillToggle.checked = autoBuyBloodPill;
    return true;
}

function saveToLocal() {
    try {
        localStorage.setItem(SAVE_KEY, JSON.stringify(buildSavePayload()));
        return true;
    } catch {
        return false;
    }
}

function loadFromLocal() {
    try {
        const candidates = [SAVE_KEY, "simpleworld_save_v1"];
        for (const key of candidates) {
            const raw = localStorage.getItem(key);
            if (!raw) continue;
            const payload = JSON.parse(raw);
            if (applySavePayload(payload)) {
                if (key !== SAVE_KEY) saveToLocal();
                return true;
            }
        }
        return false;
    } catch {
        return false;
    }
}

function advanceTime(ms) {
    const step = 100;
    let remaining = ms;
    while (remaining > 0) {
        const delta = Math.min(step, remaining);
        updateSimulation(delta);
        remaining -= delta;
    }
    renderAll();
}

itemMenuEl.addEventListener("click", (e) => {
    e.stopPropagation();
    const btn = e.target.closest("button[data-item-action]");
    if (!btn || !itemMenuState) return;
    const { itemId, source } = itemMenuState;
    const bag = getItemContainer(source);
    const maxQty = Math.max(1, bag?.[itemId] || 1);
    const qtyInput = itemMenuEl.querySelector("input[data-item-qty]");
    const currentQty = qtyInput ? Number(qtyInput.value || 1) : 1;
    itemMenuQty = Math.max(1, Math.min(maxQty, Number.isFinite(currentQty) ? currentQty : 1));
    if (btn.dataset.itemAction === "qty-minus") {
        itemMenuQty = Math.max(1, itemMenuQty - 1);
        if (qtyInput) qtyInput.value = String(itemMenuQty);
        syncItemMenuRecycleLabel(itemId, itemMenuQty);
        return;
    }
    if (btn.dataset.itemAction === "qty-plus") {
        itemMenuQty = Math.min(maxQty, itemMenuQty + 1);
        if (qtyInput) qtyInput.value = String(itemMenuQty);
        syncItemMenuRecycleLabel(itemId, itemMenuQty);
        return;
    }
    if (btn.dataset.itemAction === "qty-all") {
        itemMenuQty = maxQty;
        if (qtyInput) qtyInput.value = String(itemMenuQty);
        syncItemMenuRecycleLabel(itemId, itemMenuQty);
        return;
    }
    if (btn.dataset.itemAction === "codex") {
        closeItemMenu();
        openItemCodexDetail(itemId);
        return;
    }
    let ok = false;
    if (btn.dataset.itemAction === "use") ok = useItemFrom(source, itemId, itemMenuQty);
    if (btn.dataset.itemAction === "equip") ok = equipItemFrom(source, itemId, 1);
    if (btn.dataset.itemAction === "recycle") ok = recycleItemFrom(source, itemId, itemMenuQty);
    closeItemMenu();
    if (ok) renderAll();
});

equipSlotMenuEl.addEventListener("click", (e) => {
    e.stopPropagation();
    const btn = e.target.closest("button[data-equip-action]");
    if (!btn) return;
    const slotId = btn.dataset.slotId;
    if (!slotId) return;
    if (btn.dataset.equipAction === "remove") {
        const current = equippedSlots[slotId];
        if (current) {
            avatarInventory[current] = (avatarInventory[current] || 0) + 1;
            equippedSlots[slotId] = null;
            addLog(`卸下装备：${ITEM_DEFS[current]?.label || current}`);
            closeEquipSlotMenu();
            renderAll();
        }
        return;
    }
    if (btn.dataset.equipAction === "equip") {
        const itemId = btn.dataset.itemId;
        const source = btn.dataset.source;
        if (!itemId || !source) return;
        const ok = equipItemFrom(source, itemId, 1);
        if (ok) {
            closeEquipSlotMenu();
            renderAll();
        }
    }
});

grid.addEventListener("mousemove", (e) => {
    const cell = e.target.closest(".cell");
    if (!cell) {
        tooltip.style.display = "none";
        return;
    }

    const wx = Number(cell.dataset.wx);
    const wy = Number(cell.dataset.wy);
    const span = Number(cell.dataset.span);
    inspectText = formatChunkTooltip(wx, wy, span);
    tooltip.textContent = inspectText;
    tooltip.style.display = "block";
    tooltip.style.left = `${e.clientX + 16}px`;
    tooltip.style.top = `${e.clientY + 16}px`;
    updateSidePanels();
});

grid.addEventListener("mouseleave", () => {
    tooltip.style.display = "none";
    inspectText = "";
    updateSidePanels();
});

grid.addEventListener("click", (e) => {
    if (suppressNextMapClick) {
        suppressNextMapClick = false;
        return;
    }
    const cell = e.target.closest(".cell");
    if (!cell) return;
    const wx = Number(cell.dataset.wx);
    const wy = Number(cell.dataset.wy);
    const span = Number(cell.dataset.span);
    if (span !== 1) {
        if (isHomeBuildTile(wx, wy)) {
            zoomLevel = 1;
            openBuildPanel(wx, wy);
            renderAll();
        } else {
            closeBuildPanel();
        }
        return;
    }
    if (!isHomeBuildTile(wx, wy)) {
        closeBuildPanel();
        return;
    }
    openBuildPanel(wx, wy);
    renderAll();
});

if (mapContainerEl) {
    mapContainerEl.addEventListener("mousedown", (e) => {
        if (e.button !== 0 || isBuildFocus) return;
        isMapDragging = true;
        dragStartClientX = e.clientX;
        dragStartClientY = e.clientY;
        dragStartCameraX = cameraMode === "follow" ? avatarX : cameraX;
        dragStartCameraY = cameraMode === "follow" ? avatarY : cameraY;
        mapContainerEl.classList.add("dragging");
    });

    window.addEventListener("mousemove", (e) => {
        if (!isMapDragging) return;
        const cfg = ZOOM_LEVELS[zoomLevel];
        const unitPx = Math.max(1, cfg.cellPx);
        const worldDx = Math.round((e.clientX - dragStartClientX) / unitPx) * cfg.span;
        const worldDy = Math.round((e.clientY - dragStartClientY) / unitPx) * cfg.span;
        setCameraFreePosition(dragStartCameraX - worldDx, dragStartCameraY - worldDy);
        if (Math.abs(e.clientX - dragStartClientX) + Math.abs(e.clientY - dragStartClientY) > 5) {
            suppressNextMapClick = true;
        }
        renderAll();
    });

    window.addEventListener("mouseup", () => {
        if (!isMapDragging) return;
        isMapDragging = false;
        mapContainerEl.classList.remove("dragging");
    });
}

document.addEventListener("wheel", (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 1 : -1;
    const nextLevel = Math.max(0, Math.min(ZOOM_LEVELS.length - 1, zoomLevel + delta));
    if (nextLevel !== zoomLevel) {
        zoomLevel = nextLevel;
        renderAll();
    }
}, { passive: false });
